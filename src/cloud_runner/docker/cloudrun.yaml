apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: solace-browser-cloud-runner
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 100
      timeoutSeconds: 600
      containers:
        - image: gcr.io/PROJECT_ID/solace-browser-cloud-runner:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "2"
              memory: "2Gi"
          env:
            - name: PORT
              value: "8080"
