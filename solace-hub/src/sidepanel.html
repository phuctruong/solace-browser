<!-- Diagram: 04-hub-lifecycle -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solace Yinyang</title>
  <style>
    /* ── Design Tokens (PrimeVisionScore: all colors via var(--*)) ── */
    :root {
      --bg:        #0f172a;
      --surface-1: #111827;
      --surface-2: #1e293b;
      --surface-3: #0b1220;
      --border:    #1f2937;
      --accent:    #2563eb;
      --accent-hi: #3b82f6;
      --orch:      #6366f1;
      --text:      #e2e8f0;
      --text-muted:#94a3b8;
      --text-dim:  #475569;
      --badge-bg:  #1d4ed8;
      --badge-text:#bfdbfe;
      --lock-bg:   #1e1b4b;
      --white:     #fff;
      --orch-hi:   #818cf8;
      --orch-text: #c7d2fe;
      --green-dark:#065f46;
      --green-lite:#a7f3d0;
      --radius-sm: 10px;
      --radius-md: 14px;
      --radius-lg: 18px;
      --ease:      cubic-bezier(0.4, 0, 0.2, 1);
    }
    * { box-sizing: border-box; }
    body { font-family: Inter, system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--text); }

    /* ── Registration Gate Overlay ── */
    #gate-overlay {
      display: none;
      position: sticky; top: 0; z-index: 100;
      background: var(--lock-bg);
      border-bottom: 2px solid var(--orch);
      padding: 14px 16px; text-align: center;
    }
    #gate-overlay.visible { display: block; }
    .gate-title { margin: 6px 0 4px; font-size: 14px; font-weight: 700; }
    .gate-desc  { margin: 0 0 10px; font-size: 12px; color: var(--text-muted); }
    .gate-btn {
      display: inline-block; padding: 8px 16px;
      border-radius: 999px; background: var(--orch);
      color: var(--white); font: inherit; font-size: 13px; font-weight: 600;
      border: 0; cursor: pointer; text-decoration: none;
      transition: opacity 0.15s var(--ease);
    }
    .gate-btn:hover { opacity: 0.85; }  /* hover opacity only, no color change */

    /* ── Tab Nav ── */
    .yy-tabs {
      display: flex; gap: 6px;
      padding: 10px 12px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--bg); z-index: 50;
    }
    .yy-tab {
      flex: 1; background: var(--surface-2); color: var(--text-muted);
      border: 0; border-radius: var(--radius-sm);
      padding: 7px 8px; font: inherit; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: background 0.15s var(--ease), color 0.15s var(--ease);
    }
    .yy-tab.active { background: var(--accent); color: var(--text); }
    .yy-tab:hover:not(.active) { background: var(--surface-3); color: var(--text); }

    /* ── Panels ── */
    .yy-panel { display: none; padding: 12px 12px 24px; }
    .yy-panel.active { display: block; }

    /* ── Card ── */
    .yy-card {
      background: var(--surface-1); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 14px; margin-bottom: 12px;
    }
    .yy-card-title {
      display: block; margin: 0 0 10px;
      font-size: 11px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .yy-empty { margin: 0; color: var(--text-muted); font-size: 13px; }

    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid var(--surface-2); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Domain list ── */
    .domain-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .domain-count { font-size: 11px; color: var(--text-muted); }
    .domain-list { display: flex; flex-direction: column; gap: 7px; }

    .domain-card {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 11px; border-radius: var(--radius-md);
      background: var(--surface-3); border: 1px solid var(--border);
      cursor: pointer; text-decoration: none; color: inherit;
      transition: border-color 0.15s var(--ease), background 0.1s var(--ease);
    }
    .domain-card:hover { border-color: var(--accent); background: var(--surface-2); }
    .domain-card--orch { border-color: var(--orch); background: var(--lock-bg); }
    .domain-card--orch:hover { border-color: var(--orch-hi); }

    .domain-card__icon {
      width: 26px; height: 26px; border-radius: 7px;
      object-fit: cover; flex-shrink: 0;
    }
    .domain-card__icon-fallback {
      width: 26px; height: 26px; border-radius: 7px;
      background: var(--accent); color: var(--white);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; flex-shrink: 0;
    }
    .domain-card--orch .domain-card__icon-fallback { background: var(--orch); }

    .domain-card__body { flex: 1; min-width: 0; }
    .domain-card__name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .domain-card__desc { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
    .domain-badges { display: flex; gap: 3px; flex-shrink: 0; flex-direction: column; align-items: flex-end; }

    .badge {
      padding: 2px 6px; border-radius: 999px;
      font-size: 10px; font-weight: 600;
      background: var(--badge-bg); color: var(--badge-text);
    }
    .badge--orch { background: var(--orch); color: var(--orch-text); }
    .badge--default { background: var(--green-dark); color: var(--green-lite); }
    .badge--lock { background: var(--surface-2); color: var(--text-muted); }

    /* ── Events tab ── */
    .event-domain-label { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }
    .event-list { display: flex; flex-direction: column; gap: 7px; }
    .event-card {
      display: block; padding: 9px 11px; border-radius: var(--radius-md);
      background: var(--surface-3); border: 1px solid var(--border);
      cursor: pointer; text-decoration: none; color: inherit;
      transition: border-color 0.15s var(--ease);
    }
    .event-card:hover { border-color: var(--accent-hi); }
    .event-card__title { font-size: 13px; font-weight: 600; margin: 0 0 3px; }
    .event-card__summary { font-size: 11px; color: var(--text-muted); margin: 0 0 3px; }
    .event-card__time { font-size: 10px; color: var(--text-dim); }

    /* ── Chat tab ── */
    .chat-messages { display: flex; flex-direction: column; gap: 7px; margin-bottom: 10px; min-height: 80px; }
    .chat-msg { padding: 8px 11px; border-radius: var(--radius-md); font-size: 13px; line-height: 1.5; }
    .chat-msg--bot { background: var(--surface-2); color: var(--text); }
    .chat-msg--user { background: var(--accent); color: var(--white); align-self: flex-end; max-width: 85%; }
    .chat-input-row { display: flex; gap: 7px; }
    .chat-input {
      flex: 1; padding: 8px 11px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--surface-1);
      color: var(--text); font: inherit; font-size: 13px;
    }
    .chat-input:focus { outline: none; border-color: var(--accent); }
    .chat-send {
      padding: 8px 13px; border-radius: var(--radius-sm);
      background: var(--accent); color: var(--white); border: 0;
      font: inherit; font-size: 13px; cursor: pointer;
      transition: opacity 0.15s var(--ease);
    }
    .chat-send:hover { opacity: 0.85; }
    .chat-locked { color: var(--text-muted); font-size: 13px; text-align: center; padding: 16px 0; }
    .chat-locked a { color: var(--accent-hi); }
  </style>
</head>
<body>

  <!-- Registration gate: visible when not logged in -->
  <div id="gate-overlay">
    <div>🔒</div>
    <p class="gate-title">Activate Yinyang</p>
    <p class="gate-desc">Create a free account to enable domains, chat &amp; events</p>
    <a href="https://solaceagi.com/register" target="_blank" rel="noopener" class="gate-btn">Register at solaceagi.com</a>
  </div>

  <nav class="yy-tabs" role="tablist">
    <button class="yy-tab active" id="tab-domains" type="button" onclick="switchTab('domains')">Domains</button>
    <button class="yy-tab" id="tab-chat"    type="button" onclick="switchTab('chat')">Chat</button>
    <button class="yy-tab" id="tab-events"  type="button" onclick="switchTab('events')">Events</button>
  </nav>

  <!-- DOMAINS -->
  <section id="panel-domains" class="yy-panel active" role="tabpanel">
    <div class="yy-card">
      <div class="domain-meta">
        <span class="yy-card-title">Your Domains</span>
        <span id="domain-count" class="domain-count">Loading…</span>
      </div>
      <div id="domain-list" class="domain-list">
        <span class="spinner"></span>
      </div>
    </div>
  </section>

  <!-- CHAT -->
  <section id="panel-chat" class="yy-panel" role="tabpanel" aria-hidden="true">
    <div class="yy-card">
      <span class="yy-card-title">AI Chat</span>
      <div id="chat-messages" class="chat-messages">
        <div class="chat-msg chat-msg--bot">Hi! Ask me about your domains or apps.</div>
      </div>
      <div id="chat-locked-msg" class="chat-locked" style="display:none">
        <a href="https://solaceagi.com/register" target="_blank" rel="noopener">Sign in</a> to enable AI chat
      </div>
      <div id="chat-input-row" class="chat-input-row">
        <input id="chat-input" class="chat-input" type="text" placeholder="Ask anything…" />
        <button id="chat-send" class="chat-send" type="button">Send</button>
      </div>
    </div>
  </section>

  <!-- EVENTS -->
  <section id="panel-events" class="yy-panel" role="tabpanel" aria-hidden="true">
    <div class="yy-card">
      <span class="yy-card-title">Recent Events</span>
      <p id="event-domain-label" class="event-domain-label">Detecting current site…</p>
      <div id="event-list" class="event-list">
        <span class="spinner"></span>
      </div>
    </div>
  </section>

  <script src="./sidepanel.js"></script>
</body>
</html>
