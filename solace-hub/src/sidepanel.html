<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solace Hub Sidebar</title>
  <style>
    body { font-family: Inter, system-ui, sans-serif; margin: 0; background: #0f172a; color: #e2e8f0; }
    .yy-tabs { display: flex; gap: 8px; padding: 12px; border-bottom: 1px solid #1e293b; }
    .yy-tab { background: #1e293b; color: #e2e8f0; border: 0; border-radius: 10px; padding: 8px 12px; }
    .yy-tab.active { background: #2563eb; }
    .yy-panel { display: none; padding: 16px; }
    .yy-panel.active { display: block; }
    .yy-section { background: #111827; border: 1px solid #1f2937; border-radius: 16px; padding: 16px; margin-bottom: 16px; }
    .yy-section-title, .panel-title { margin: 0 0 12px; font-size: 14px; font-weight: 700; }
    .solace-panel { display: flex; flex-direction: column; gap: 12px; }
    .panel-header, .app-info, .panel-actions { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .apps-list { display: flex; flex-direction: column; gap: 10px; }
    .app-card { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px; border-radius: 12px; background: #0b1220; border: 1px solid #1f2937; }
    .app-name { font-weight: 600; display: block; }
    .app-tier { font-size: 12px; color: #93c5fd; }
    .badge { min-width: 24px; text-align: center; padding: 2px 8px; border-radius: 999px; background: #1d4ed8; font-size: 12px; }
    .btn-primary, .btn-secondary, .btn-install { border: 0; border-radius: 10px; padding: 8px 12px; cursor: pointer; }
    .btn-primary, .btn-install { background: #2563eb; color: white; }
    .btn-secondary { background: #334155; color: #e2e8f0; }
    .btn-primary[disabled], .btn-secondary[disabled], .btn-install[disabled] { opacity: 0.6; cursor: not-allowed; }
    .yy-empty { margin: 0; color: #94a3b8; font-size: 13px; }
  </style>
</head>
<body>
  <nav class="yy-tabs" role="tablist">
    <button class="yy-tab active" id="tab-now" type="button" onclick="switchTab('now')">Now</button>
    <button class="yy-tab" id="tab-runs" type="button" onclick="switchTab('runs')">Runs</button>
    <button class="yy-tab" id="tab-chat" type="button" onclick="switchTab('chat')">Chat</button>
    <button class="yy-tab" id="tab-more" type="button" onclick="switchTab('more')">More</button>
  </nav>

  <section id="panel-now" class="yy-panel active" role="tabpanel">
    <div class="yy-section">
      <h3 class="yy-section-title">Current Site</h3>
      <p id="current-domain-label" class="yy-empty">Detecting current site...</p>
    </div>

    <div id="domain-apps-panel" class="yy-section solace-panel" data-panel="domain-apps">
      <div class="panel-header">
        <span class="panel-title">Apps for this site</span>
        <span id="domain-apps-count" class="badge">0</span>
      </div>
      <div id="domain-apps-list" class="apps-list">
        <p class="yy-empty">No matching apps yet.</p>
      </div>
      <div class="panel-actions">
        <button id="create-custom-app-btn" class="btn-secondary" type="button">+ Create Custom App</button>
        <button id="submit-to-store-btn" class="btn-primary" type="button" data-tier="pro">Submit to Store</button>
      </div>
    </div>
  </section>

  <section id="panel-runs" class="yy-panel" role="tabpanel" aria-hidden="true">
    <div class="yy-section"><p class="yy-empty">Recent runs appear here.</p></div>
  </section>
  <section id="panel-chat" class="yy-panel" role="tabpanel" aria-hidden="true">
    <div class="yy-section"><p class="yy-empty">Chat is available from the Hub runtime.</p></div>
  </section>
  <section id="panel-more" class="yy-panel" role="tabpanel" aria-hidden="true">
    <div class="yy-section"><p class="yy-empty">More sidebar settings appear here.</p></div>
  </section>

  <script src="./sidepanel.js"></script>
</body>
</html>
