<!-- Diagram: 04-hub-lifecycle -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solace Hub</title>
  <link rel="icon" href="/icons/yinyang-logo.png">
  <link rel="stylesheet" href="/styleguide.css">
  <style>
    .hub-center { max-width:500px; margin:1rem auto; padding:0 1rem; }
    .hub-scan { text-align:center; padding:2rem 1rem; }
    .hub-scan img { width:100px; height:auto; }
    .hub-scan-text { font-size:1.1rem; font-weight:600; margin-top:1rem; }
    .hub-llm-chips { display:flex; flex-wrap:wrap; gap:0.5rem; margin:0.75rem 0; }
    .hub-llm-chip { display:inline-flex; align-items:center; gap:4px; padding:6px 12px; background:var(--sb-accent-soft); border:1px solid var(--sb-accent); border-radius:var(--sb-radius); font-size:0.9rem; font-weight:600; }
    .hub-status-row { display:flex; align-items:center; gap:0.75rem; padding:0.3rem 0; font-size:0.85rem; }
    .hub-gate { text-align:center; padding:2rem; }
    .hub-gate-msg { font-size:1rem; color:var(--sb-text-muted); margin:1rem 0; }
    .hub-ready { border:2px solid var(--sb-success); }
    .hub-blocked { border:2px solid var(--sb-danger); opacity:0.6; }
    .hub-check { display:flex; align-items:center; gap:0.75rem; padding:1rem; cursor:pointer; }
    .hub-check input { width:20px; height:20px; accent-color:var(--sb-accent); }
    .hub-launch { width:100%; padding:0.75rem; font-size:1rem; }
    #scan-phase { transition: opacity 0.5s; }
  </style>
</head>
<body>

<!-- TOP BAR -->
<header class="sb-topbar">
  <div class="sb-topbar-brand">
    <img src="/icons/yinyang-logo.png" alt="Solace">
    <span>Solace Hub</span>
  </div>
  <div class="sb-topbar-spacer"></div>
  <span class="sb-pill" id="topbar-auth"></span>
  <div class="sb-theme-group">
    <button class="sb-theme-btn sb-theme-btn--active" data-theme="dark">Dark</button>
    <button class="sb-theme-btn" data-theme="light">Light</button>
  </div>
  <div class="sb-lang-switcher">
    <button class="sb-lang-toggle" id="languageToggle" aria-label="Language" aria-expanded="false" type="button">
      <img src="/icons/lang/globe-default.png" alt="" class="sb-lang-icon sb-lang-icon--default">
      <img src="/icons/lang/globe-hover.png" alt="" class="sb-lang-icon sb-lang-icon--hover">
    </button>
    <div class="sb-lang-menu" id="languageMenu" role="menu" hidden>
      <a href="#" role="menuitem" aria-current="page">English</a>
      <a href="#" role="menuitem">Tiếng Việt</a><a href="#" role="menuitem">日本語</a>
      <a href="#" role="menuitem">한국어</a><a href="#" role="menuitem">中文</a>
      <a href="#" role="menuitem">Español</a><a href="#" role="menuitem">Français</a>
      <a href="#" role="menuitem">Deutsch</a>
    </div>
  </div>
</header>

<div class="hub-center">

  <!-- PHASE 1: SCANNING -->
  <div id="scan-phase" class="hub-scan">
    <img src="/media/droplet-logo-merge_3x_128px.gif" alt="Scanning..." id="scan-img">
    <div class="hub-scan-text" id="scan-text">Detecting local AI tools...</div>
  </div>

  <!-- PHASE 2: RESULTS (hidden until scan completes) -->
  <div id="results-phase" style="display:none">

    <!-- LLM Setup -->
    <div class="sb-card" id="llm-card">
      <p class="sb-kicker">LLM Power Source</p>
      <div class="hub-llm-chips" id="llm-chips"></div>
      <div id="llm-gate"></div>
    </div>

    <!-- System Status -->
    <div class="sb-card sb-mt-md">
      <p class="sb-kicker">System Status</p>
      <div class="hub-status-row"><span class="sb-topbar-dot sb-topbar-dot--on" id="dot-dashboard"></span> Dashboard :8888</div>
      <div class="hub-status-row"><span class="sb-topbar-dot sb-topbar-dot--on" id="dot-mcp"></span> MCP Server</div>
      <div class="hub-status-row"><span class="sb-topbar-dot sb-topbar-dot--off" id="dot-sidebar"></span> Yinyang Sidebar</div>
      <div class="hub-status-row"><span class="sb-topbar-dot" id="dot-remote"></span> Remote Control</div>
      <div class="hub-status-row"><span class="sb-topbar-dot sb-topbar-dot--on" id="dot-cron"></span> Cron Services</div>
    </div>

    <!-- Launch Gate -->
    <div class="sb-card sb-mt-md" id="launch-card">
      <label class="hub-check" id="ready-check">
        <input type="checkbox" id="ready-checkbox" disabled>
        <span id="ready-label">Checking LLM access...</span>
      </label>
      <button class="sb-btn sb-btn--primary hub-launch" id="btn-launch" disabled onclick="launchBrowser()">
        Launch Solace Browser
      </button>
    </div>


  </div>
</div>

<div class="sb-toast-container" id="toast-container"></div>

<script>
(function() {
  'use strict';
  function get(p){return fetch(p).then(function(r){return r.json()});}
  function $(id){return document.getElementById(id);}
  function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
  function toast(m,t){var c=$('toast-container'),e=document.createElement('div');e.className='sb-toast sb-toast--'+(t||'success');e.textContent=m;c.appendChild(e);setTimeout(function(){e.remove();},4000);}

  // Theme
  document.querySelectorAll('.sb-theme-btn').forEach(function(b){b.addEventListener('click',function(){document.documentElement.setAttribute('data-theme',b.dataset.theme);document.querySelectorAll('.sb-theme-btn').forEach(function(x){x.classList.toggle('sb-theme-btn--active',x===b);});});});

  // Language
  var lt=$('languageToggle'),lm=$('languageMenu');
  if(lt){lt.addEventListener('click',function(e){e.stopPropagation();var o=!lm.classList.contains('active');if(o)lm.removeAttribute('hidden');lm.classList.toggle('active',o);if(!o)lm.setAttribute('hidden','');});document.addEventListener('click',function(e){if(!lt.contains(e.target)&&!lm.contains(e.target)){lm.classList.remove('active');lm.setAttribute('hidden','');}});}

  // ─── SCAN + GATE LOGIC ───
  var hasLLM = false;

  function runScan() {
    get('/api/v1/agents').then(function(d) {
      var agents = d.agents || [];
      var installed = agents.filter(function(a){return a.installed;});
      hasLLM = installed.length > 0;

      // Transition: merge → rotate → reveal
      $('scan-img').src = '/media/yinyang-rotating_70pct_128px.gif';
      $('scan-text').textContent = installed.length + ' AI tools found!';
      $('scan-text').style.color = installed.length > 0 ? 'var(--sb-success)' : 'var(--sb-danger)';

      // Build LLM chips
      var chips = '';
      installed.forEach(function(a) {
        chips += '<span class="hub-llm-chip">✓ ' + esc(a.id) + '</span>';
      });

      // Auth pill
      var auth = $('topbar-auth');
      if (hasLLM) {
        auth.textContent = installed.length + ' Local LLMs';
        auth.className = 'sb-pill sb-pill--success';
      } else {
        auth.textContent = 'No LLM';
        auth.className = 'sb-pill sb-pill--danger';
      }

      // Remote status
      get('/api/v1/cloud/status').then(function(c) {
        $('dot-remote').className = 'sb-topbar-dot sb-topbar-dot--' + (c.connected ? 'on' : 'off');
      });

      setTimeout(function() {
        $('scan-phase').style.opacity = '0';
        setTimeout(function() {
          $('scan-phase').style.display = 'none';
          $('results-phase').style.display = 'block';

          if (hasLLM) {
            // LLMs found — ready to launch
            $('llm-chips').innerHTML = chips;
            $('llm-gate').innerHTML = '';
            $('llm-card').classList.add('hub-ready');
            $('llm-card').classList.remove('hub-blocked');
            $('ready-checkbox').checked = true;
            $('ready-checkbox').disabled = false;
            $('ready-label').textContent = 'Ready to launch Solace Browser';
            $('ready-label').style.color = 'var(--sb-success)';
            $('btn-launch').disabled = false;
            $('launch-card').classList.add('hub-ready');
          } else {
            // No LLMs — gate blocked
            $('llm-chips').innerHTML = '<span class="sb-text-muted">No AI tools detected on PATH</span>';
            $('llm-gate').innerHTML =
              '<div class="hub-gate">' +
              '<div class="hub-gate-msg">Solace Browser requires an LLM to power it.</div>' +
              '<div class="sb-flex sb-gap-sm" style="justify-content:center;flex-wrap:wrap">' +
              '<button class="sb-btn sb-btn--primary" onclick="promptBYOK()">Enter API Key (BYOK)</button>' +
              '<button class="sb-btn" onclick="window.open(\'https://solaceagi.com/dashboard\',\'_blank\')">Sign Up for Managed LLM</button>' +
              '</div>' +
              '<div class="sb-text-muted sb-mt-md" style="font-size:0.8rem">Or install claude, codex, or gemini CLI on your PATH</div>' +
              '</div>';
            $('llm-card').classList.add('hub-blocked');
            $('ready-checkbox').checked = false;
            $('ready-checkbox').disabled = true;
            $('ready-label').textContent = 'LLM required before launching browser';
            $('ready-label').style.color = 'var(--sb-danger)';
            $('btn-launch').disabled = true;
            $('launch-card').classList.add('hub-blocked');
          }
        }, 500);
      }, 1200);
    });
  }

  // ─── Launch Browser ───
  window.launchBrowser = function() {
    if (!hasLLM) { toast('LLM required. Set up BYOK or install a CLI tool.', 'danger'); return; }
    toast('Launching Solace Browser...', 'success');
    $('dot-sidebar').className = 'sb-topbar-dot sb-topbar-dot--on';
    // Launch the actual browser binary
    fetch('/api/v1/browser/launch', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({})})
      .then(function(r){return r.json();})
      .then(function(d) {
        if (d.session_id) toast('Browser launched!', 'success');
        else toast(d.error || 'Launch failed', 'danger');
      })
      .catch(function() { toast('Browser launch API not available', 'warning'); });
  };

  // ─── BYOK prompt ───
  window.promptBYOK = function() {
    var key = prompt('Enter your API key (Anthropic, OpenAI, or OpenRouter):');
    if (key && key.trim()) {
      fetch('/api/v1/cloud/connect', {method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({api_key:key.trim(), user_email:'local@solace', device_id:'local', paid_user:false})
      }).then(function(){
        toast('API key saved! Refreshing...', 'success');
        setTimeout(function(){ location.reload(); }, 1500);
      });
    }
  };

  // ─── Ready checkbox toggle ───
  $('ready-checkbox').addEventListener('change', function() {
    $('btn-launch').disabled = !this.checked;
  });

  // ─── Init ───
  runScan();

})();
</script>
</body>
</html>
