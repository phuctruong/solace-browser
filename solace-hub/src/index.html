<!-- Diagram: 04-hub-lifecycle -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solace Hub</title>
  <link rel="icon" href="/icons/yinyang-logo.png">
  <link rel="stylesheet" href="/styleguide.css">
  <link rel="stylesheet" href="/vendor/jquery.dataTables.min.css">
  <script src="/vendor/jquery-3.7.1.min.js"></script>
  <script src="/vendor/jquery.dataTables.min.js"></script>
  <script src="/vendor/mermaid.min.js"></script>
  <style>
    .hub-hero { border: 2px solid var(--sb-accent); background: linear-gradient(135deg, var(--sb-surface), var(--sb-surface-strong)); }
    .hub-run-btn { margin-left: auto; }
    #tab-content { min-height: 400px; }
  </style>
</head>
<body>

<!-- TOP BAR -->
<header class="sb-topbar">
  <div class="sb-topbar-brand">
    <img src="/icons/yinyang-logo.png" alt="Solace">
    <span>Solace Hub</span>
  </div>
  <div class="sb-topbar-spacer"></div>
  <span class="sb-topbar-stat"><span class="sb-topbar-dot sb-topbar-dot--on" id="health-dot"></span> <span id="health-text">Checking...</span></span>
  <span class="sb-topbar-stat" id="topbar-agents"></span>
  <span class="sb-topbar-stat" id="topbar-apps"></span>
  <span class="sb-topbar-stat" id="topbar-evidence"></span>
  <span class="sb-pill" id="topbar-auth" style="cursor:pointer" title="Click to sign in"></span>
  <div class="sb-theme-group">
    <button class="sb-theme-btn sb-theme-btn--active" data-theme="dark">Dark</button>
    <button class="sb-theme-btn" data-theme="light">Light</button>
  </div>
  <div class="sb-lang-switcher">
    <button class="sb-lang-toggle" id="languageToggle" aria-label="Language" aria-expanded="false" aria-controls="languageMenu" aria-haspopup="menu" type="button">
      <img src="/icons/lang/globe-default.png" alt="" class="sb-lang-icon sb-lang-icon--default">
      <img src="/icons/lang/globe-hover.png" alt="" class="sb-lang-icon sb-lang-icon--hover">
    </button>
    <div class="sb-lang-menu" id="languageMenu" role="menu" hidden>
      <a href="#" role="menuitem" aria-current="page">English</a>
      <a href="#" role="menuitem">Tiếng Việt</a><a href="#" role="menuitem">日本語</a>
      <a href="#" role="menuitem">한국어</a><a href="#" role="menuitem">中文</a>
      <a href="#" role="menuitem">Español</a><a href="#" role="menuitem">Français</a>
      <a href="#" role="menuitem">Deutsch</a><a href="#" role="menuitem">Português</a>
      <a href="#" role="menuitem">العربية</a><a href="#" role="menuitem">हिन्दी</a>
      <a href="#" role="menuitem">ไทย</a><a href="#" role="menuitem">Bahasa Indonesia</a>
    </div>
  </div>
</header>

<!-- TABS -->
<nav class="sb-tabs" role="tablist" id="main-tabs">
  <button class="sb-tab sb-tab--active" data-view="overview" role="tab">Overview</button>
  <button class="sb-tab" data-view="apps" role="tab">Apps <span class="sb-tab-badge" id="apps-badge">0</span></button>
  <button class="sb-tab" data-view="evidence" role="tab">Evidence</button>
  <button class="sb-tab" data-view="domains" role="tab">Domains</button>
  <button class="sb-tab" data-view="agents" role="tab">Agents</button>
</nav>

<!-- TAB CONTENT -->
<div id="tab-content" style="padding:1rem 1.5rem">

  <!-- OVERVIEW -->
  <div class="sb-tab-panel" id="panel-overview">
    <div class="sb-card hub-hero">
      <div class="sb-flex" style="justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem">
        <div>
          <div style="font-size:1.4rem;font-weight:700" id="hero-greeting">Loading...</div>
          <div class="sb-text-muted" id="hero-streak"></div>
        </div>
        <img src="/media/droplet-logo-rotating_70pct_128px.gif" style="width:64px;height:auto" alt="">
      </div>
      <div class="sb-flex sb-gap-md sb-mt-md" style="flex-wrap:wrap">
        <div class="sb-card" style="flex:1;min-width:180px">
          <small class="sb-text-muted">Last run</small>
          <div id="hero-last-run">—</div>
        </div>
        <div class="sb-card" style="flex:1;min-width:180px">
          <small class="sb-text-muted">Next scheduled</small>
          <div id="hero-next-run">—</div>
        </div>
        <div class="hub-run-btn">
          <button class="sb-btn sb-btn--primary" id="btn-run-morning" onclick="runApp('morning-brief')">▶ Run Morning Cycle</button>
        </div>
      </div>
    </div>
    <div class="sb-mt-md" id="overview-upgrade" style="display:none">
      <div class="sb-card" style="border-left:4px solid var(--sb-warning);padding:0.75rem 1rem">
        <strong style="color:var(--sb-warning)">⚠</strong> <span id="upgrade-message"></span>
      </div>
    </div>
  </div>

  <!-- APPS -->
  <div class="sb-tab-panel" id="panel-apps" hidden>
    <div class="sb-card-grid" id="apps-grid">
      <div class="sb-empty"><div class="sb-empty-icon">📦</div><div>Loading apps...</div></div>
    </div>
  </div>

  <!-- EVIDENCE -->
  <div class="sb-tab-panel" id="panel-evidence" hidden>
    <div class="sb-flex" style="justify-content:space-between;align-items:center;margin-bottom:1rem">
      <div>
        <span class="sb-pill sb-pill--success" id="ev-chain-badge">Checking...</span>
        <span class="sb-pill sb-pill--info" id="ev-part11-badge"></span>
        <strong style="margin-left:8px" id="ev-count">0 entries</strong>
      </div>
    </div>
    <div class="sb-card" style="padding:0;overflow:hidden">
      <table class="sb-table" id="evidence-table">
        <thead><tr><th>Event</th><th>Actor</th><th>Hash</th><th>Time</th></tr></thead>
        <tbody id="evidence-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- DOMAINS -->
  <div class="sb-tab-panel" id="panel-domains" hidden>
    <div class="sb-card-grid" id="domains-grid">
      <div class="sb-empty"><div class="sb-empty-icon">🌐</div><div>Loading domains...</div></div>
    </div>
  </div>

  <!-- AGENTS -->
  <div class="sb-tab-panel" id="panel-agents" hidden>
    <div class="sb-card-grid" id="agents-grid">
      <div class="sb-empty"><div class="sb-empty-icon">🤖</div><div>Loading agents...</div></div>
    </div>
  </div>

</div>

<!-- TOAST CONTAINER -->
<div class="sb-toast-container" id="toast-container"></div>

<script>
(function() {
  'use strict';
  var API = '';

  // ─── Helpers ───
  function get(path) { return fetch(API + path).then(function(r) { return r.json(); }); }
  function post(path, body) { return fetch(API + path, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body||{}) }).then(function(r) { return r.json(); }); }
  function $(id) { return document.getElementById(id); }
  function toast(msg, type) {
    var c = $('toast-container'), t = document.createElement('div');
    t.className = 'sb-toast sb-toast--' + (type||'success');
    t.textContent = msg; c.appendChild(t);
    setTimeout(function() { t.style.opacity='0'; setTimeout(function() { t.remove(); }, 300); }, 4000);
  }
  function timeAgo(iso) {
    if (!iso) return '—';
    var diff = (Date.now() - new Date(iso).getTime()) / 1000;
    if (diff < 60) return Math.floor(diff) + 's ago';
    if (diff < 3600) return Math.floor(diff/60) + 'm ago';
    if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
    return Math.floor(diff/86400) + 'd ago';
  }
  function esc(s) { var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

  // ─── Tabs ───
  var tabs = [].slice.call(document.querySelectorAll('#main-tabs .sb-tab'));
  var panels = document.querySelectorAll('.sb-tab-panel');
  tabs.forEach(function(btn, idx) {
    btn.addEventListener('click', function() {
      tabs.forEach(function(b) { b.classList.toggle('sb-tab--active', b===btn); });
      panels.forEach(function(p) { p.hidden = p.id !== 'panel-'+btn.dataset.view; });
    });
    btn.addEventListener('keydown', function(e) {
      var next;
      if (e.key==='ArrowRight') next=tabs[(idx+1)%tabs.length];
      else if (e.key==='ArrowLeft') next=tabs[(idx-1+tabs.length)%tabs.length];
      if (next) { e.preventDefault(); next.focus(); next.click(); }
    });
  });

  // ─── Theme ───
  document.querySelectorAll('.sb-theme-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.documentElement.setAttribute('data-theme', btn.dataset.theme);
      document.querySelectorAll('.sb-theme-btn').forEach(function(b) { b.classList.toggle('sb-theme-btn--active', b===btn); });
    });
  });

  // ─── Language ───
  var langToggle = $('languageToggle'), langMenu = $('languageMenu');
  if (langToggle) {
    langToggle.addEventListener('click', function(e) { e.stopPropagation(); var open=!langMenu.classList.contains('active'); if(open) langMenu.removeAttribute('hidden'); langMenu.classList.toggle('active',open); langToggle.setAttribute('aria-expanded',open); if(!open) langMenu.setAttribute('hidden',''); });
    document.addEventListener('click', function(e) { if(!langToggle.contains(e.target)&&!langMenu.contains(e.target)) { langMenu.classList.remove('active'); langMenu.setAttribute('hidden',''); } });
  }

  // ─── Load Overview ───
  function loadOverview() {
    get('/api/v1/delight').then(function(d) {
      $('hero-greeting').textContent = d.greeting || 'Welcome';
      var streak = '';
      if (d.streak_days > 0) streak = 'Day ' + d.streak_days + ' streak · ';
      streak += d.total_runs + ' total runs';
      if (d.celebration) streak += ' · ' + d.celebration;
      $('hero-streak').textContent = streak;
    });
    get('/api/v1/sidebar/state').then(function(d) {
      // Auth status in top bar
      var auth = $('topbar-auth');
      var gateLabels = {
        'unregistered': { text: 'Not signed in', cls: 'sb-pill--danger' },
        'no_llm': { text: 'Signed in · No LLM', cls: 'sb-pill--warning' },
        'byok': { text: 'Signed in · BYOK', cls: 'sb-pill--success' },
        'paid': { text: 'Signed in · Managed', cls: 'sb-pill--success' }
      };
      var label = gateLabels[d.gate] || { text: d.gate, cls: 'sb-pill--info' };
      auth.textContent = label.text;
      auth.className = 'sb-pill ' + label.cls;
      auth.style.cursor = 'pointer';
      // Upgrade CTA
      if (d.upgrade_cta) {
        $('overview-upgrade').style.display = 'block';
        $('upgrade-message').textContent = d.upgrade_message || 'Upgrade available';
      }
    });
  }

  // ─── Load Health + Top Bar ───
  function loadHealth() {
    get('/health').then(function(d) {
      $('health-dot').className = 'sb-topbar-dot sb-topbar-dot--on';
      $('health-text').textContent = 'Runtime :8888';
    }).catch(function() {
      $('health-dot').className = 'sb-topbar-dot sb-topbar-dot--off';
      $('health-text').textContent = 'Offline';
    });
    get('/api/v1/agents').then(function(d) {
      var count = d.agents ? d.agents.length : 0;
      $('topbar-agents').innerHTML = '<span class="sb-topbar-dot sb-topbar-dot--on"></span> ' + count + ' agents';
    });
    get('/api/apps').then(function(d) {
      var count = d.apps ? d.apps.length : 0;
      $('topbar-apps').textContent = count + ' apps';
      $('apps-badge').textContent = count;
    });
    get('/api/v1/evidence/count').then(function(d) {
      $('topbar-evidence').textContent = (d.count||0).toLocaleString() + ' evidence';
    });
  }

  // ─── Load Apps ───
  function loadApps() {
    get('/api/apps').then(function(d) {
      var grid = $('apps-grid');
      if (!d.apps || d.apps.length === 0) {
        grid.innerHTML = '<div class="sb-empty"><div class="sb-empty-icon">📦</div><div>No apps found</div><div class="sb-empty-action"><button class="sb-btn sb-btn--primary sb-btn--sm" onclick="runApp(\'hackernews-feed\')">▶ Run First App</button></div></div>';
        return;
      }
      var html = '';
      d.apps.forEach(function(app) {
        var icon = '/icons/apps/' + app.domain.replace(/\..*/,'') + '.png';
        html += '<div class="sb-card">' +
          '<div class="sb-card-header">' +
            '<span class="sb-app-name"><img src="' + icon + '" class="sb-app-icon" onerror="this.src=\'/icons/yinyang-logo.png\'"> ' + esc(app.id) + '</span>' +
            '<span class="sb-pill sb-pill--success">●</span>' +
          '</div>' +
          '<div class="sb-card-body">' +
            '<div class="sb-text-muted">' + esc(app.domain) + '</div>' +
            (app.schedule ? '<div class="sb-text-mono sb-timestamp">' + esc(app.schedule) + '</div>' : '') +
            '<div class="sb-mt-md"><button class="sb-btn sb-btn--sm" onclick="runApp(\'' + esc(app.id) + '\')">▶ Run</button> ' +
            '<a href="/apps/' + esc(app.id) + '" class="sb-btn sb-btn--sm">Details</a></div>' +
          '</div></div>';
      });
      grid.innerHTML = html;
    });
  }

  // ─── Load Evidence ───
  function loadEvidence() {
    get('/api/v1/evidence/count').then(function(d) {
      $('ev-count').textContent = (d.count||0).toLocaleString() + ' entries';
    });
    get('/api/v1/evidence/part11').then(function(d) {
      var p = d.part11 || {};
      $('ev-chain-badge').textContent = p.chain_valid ? 'Chain Valid ✓' : 'Chain Broken ✗';
      $('ev-chain-badge').className = 'sb-pill ' + (p.chain_valid ? 'sb-pill--success' : 'sb-pill--danger');
      $('ev-part11-badge').textContent = 'ALCOA Part 11' + (p.enabled ? ' ✓' : '');
      $('ev-part11-badge').className = 'sb-pill sb-pill--info';
    });
    get('/api/v1/evidence?limit=50').then(function(d) {
      var tbody = $('evidence-tbody');
      var rows = '';
      (d.entries || []).forEach(function(e) {
        var hash = (e.hash || e.sha256_chain_link || '').substring(0, 16) + '...';
        rows += '<tr><td>' + esc(e.event || e.action_type || '—') + '</td>' +
          '<td>' + esc(e.actor || 'system') + '</td>' +
          '<td class="sb-text-mono">' + hash + '</td>' +
          '<td>' + timeAgo(e.timestamp || e.timestamp_iso8601) + '</td></tr>';
      });
      tbody.innerHTML = rows || '<tr><td colspan="4" class="sb-text-muted" style="text-align:center">No evidence entries yet. Run an app to create evidence.</td></tr>';
      if (rows && jQuery.fn.DataTable && !jQuery.fn.DataTable.isDataTable('#evidence-table')) {
        jQuery('#evidence-table').DataTable({ paging:true, searching:true, ordering:true, pageLength:25, dom:'ftip' });
      }
    });
  }

  // ─── Load Domains ───
  function loadDomains() {
    get('/api/v1/domains').then(function(d) {
      var grid = $('domains-grid');
      var domains = d.domains || {};
      var keys = Object.keys(domains).sort();
      if (keys.length === 0) {
        grid.innerHTML = '<div class="sb-empty"><div class="sb-empty-icon">🌐</div><div>No domains found</div></div>';
        return;
      }
      var html = '';
      keys.forEach(function(domain) {
        var count = domains[domain];
        var icon = '/icons/apps/' + domain.replace(/\..*/,'') + '.png';
        html += '<div class="sb-card">' +
          '<div class="sb-card-header">' +
            '<span class="sb-app-name"><img src="' + icon + '" class="sb-app-icon" onerror="this.src=\'/icons/yinyang-logo.png\'"> ' + esc(domain) + '</span>' +
            '<span class="sb-pill sb-pill--info">' + count + ' apps</span>' +
          '</div>' +
          '<div class="sb-card-body">' +
            '<a href="/domains/' + encodeURIComponent(domain) + '" class="sb-btn sb-btn--sm">View Domain →</a>' +
          '</div></div>';
      });
      grid.innerHTML = html;
    });
  }

  // ─── Load Agents ───
  function loadAgents() {
    get('/api/v1/agents').then(function(d) {
      var grid = $('agents-grid');
      var agents = d.agents || [];
      if (agents.length === 0) {
        grid.innerHTML = '<div class="sb-empty"><div class="sb-empty-icon">🤖</div><div>No AI agents detected</div><div class="sb-text-muted">Install claude, codex, or gemini on PATH</div></div>';
        return;
      }
      var html = '';
      agents.forEach(function(a) {
        var models = (a.models || []).join(', ');
        html += '<div class="sb-card">' +
          '<div class="sb-card-header">' +
            '<h3 class="sb-card-title">' + esc(a.name || a.id) + '</h3>' +
            '<span class="sb-pill ' + (a.installed ? 'sb-pill--success' : 'sb-pill--danger') + '">● ' + (a.installed ? 'installed' : 'missing') + '</span>' +
          '</div>' +
          '<div class="sb-card-body">' +
            '<div class="sb-text-muted">Models: ' + esc(models) + '</div>' +
            '<div class="sb-text-mono sb-timestamp">' + esc(a.path || a.cmd || '') + '</div>' +
          '</div></div>';
      });
      grid.innerHTML = html;
    });
  }

  // ─── Run App ───
  window.runApp = function(appId) {
    toast('Running ' + appId + '...', 'success');
    post('/api/v1/apps/run/' + appId).then(function(d) {
      if (d.ok) {
        toast(appId + ' completed!', 'success');
        loadHealth();
        loadEvidence();
      } else {
        toast('Error: ' + (d.error || 'unknown'), 'danger');
      }
    }).catch(function(e) { toast('Failed: ' + e, 'danger'); });
  };

  // ─── Init ───
  loadHealth();
  loadOverview();
  loadApps();
  loadEvidence();
  loadDomains();
  loadAgents();

  // Mermaid
  if (typeof mermaid !== 'undefined') {
    mermaid.initialize({ startOnLoad:true, theme:'dark', themeVariables: {
      primaryColor:'#1a2d47', primaryTextColor:'#e8ecf2', primaryBorderColor:'#78b9ff',
      lineColor:'#78b9ff', fontFamily:'Segoe UI,system-ui,sans-serif', fontSize:'14px'
    }});
  }

})();
</script>
</body>
</html>
