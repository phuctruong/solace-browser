# Cloud Run Deployment for Phase 2: MVP Crawl
# This configuration deploys Solace Browser for the 40-day Silicon Valley fans crawl

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: solace-browser-phase2
  namespace: default
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"  # Scales to 10 workers for parallel crawl
        run.googleapis.com/cpu-throttling: "false"  # Always allocate CPU
    spec:
      serviceAccountName: solace-browser-phase2
      containers:
      - image: gcr.io/PROJECT_ID/solace-browser:phase2
        ports:
        - containerPort: 9222
        resources:
          limits:
            memory: "2Gi"
            cpu: "2"
          requests:
            memory: "1.5Gi"
            cpu: "1"
        env:
        # Solace Browser Configuration
        - name: BROWSER_HEADLESS
          value: "true"
        - name: BROWSER_PORT
          value: "9222"

        # CAPTCHA Solver Configuration (Anti-Captcha API)
        - name: ANTI_CAPTCHA_API_KEY
          valueFrom:
            secretKeyRef:
              name: solace-secrets
              key: anti-captcha-api-key
        - name: ANTI_CAPTCHA_ENABLED
          value: "true"

        # Platform API Credentials
        - name: TWITTER_BEARER_TOKEN
          valueFrom:
            secretKeyRef:
              name: solace-secrets
              key: twitter-bearer-token
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: solace-secrets
              key: github-token
        - name: LINKEDIN_SESSION
          valueFrom:
            secretKeyRef:
              name: solace-secrets
              key: linkedin-session

        # Crawl Configuration
        - name: CRAWL_MODE
          value: "pilot"  # "pilot" or "full"
        - name: MAX_PARALLEL_WORKERS
          value: "5"  # Pilot: 5 workers, Full: 10
        - name: RATE_LIMIT_DELAY_MS
          value: "2000"  # 2 seconds between requests
        - name: CAPTCHA_TIMEOUT_MS
          value: "60000"  # 60 seconds for CAPTCHA solving
        - name: TARGET_ENTRIES
          value: "200"  # Pilot target: 200 entries

        # Logging & Monitoring
        - name: LOG_LEVEL
          value: "INFO"
        - name: METRICS_ENABLED
          value: "true"
        - name: TRACE_SAMPLING_RATE
          value: "0.1"  # 10% sampling

        # Timeout (Phase 2: 1 hour max per request)
        - name: REQUEST_TIMEOUT_SECONDS
          value: "3600"

        # Health check
        livenessProbe:
          httpGet:
            path: /health
            port: 9222
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: 9222
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2

---

# Service Account for Cloud Run
apiVersion: iam.cnpg.io/v1
kind: ServiceAccount
metadata:
  name: solace-browser-phase2
spec:
  # Permissions needed:
  # - Cloud Logging: Write logs
  # - Cloud Monitoring: Publish metrics
  # - Secret Manager: Read API keys
  # - Cloud Storage: Read/write sessions and results

---

# Kubernetes Secret for API Keys
apiVersion: v1
kind: Secret
metadata:
  name: solace-secrets
type: Opaque
stringData:
  # Anti-Captcha API Key (create at https://anti-captcha.com)
  anti-captcha-api-key: "YOUR_ANTI_CAPTCHA_API_KEY"

  # Twitter API v2 Bearer Token
  twitter-bearer-token: "YOUR_TWITTER_BEARER_TOKEN"

  # GitHub Personal Access Token
  github-token: "YOUR_GITHUB_TOKEN"

  # LinkedIn Session Cookie (from logged-in browser)
  linkedin-session: "YOUR_LINKEDIN_SESSION_COOKIE"

---

# Horizontal Pod Autoscaler for scaling during full crawl
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: solace-browser-hpa
spec:
  scaleTargetRef:
    apiVersion: serving.knative.dev/v1
    kind: Service
    name: solace-browser-phase2
  minReplicas: 1
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max

---

# ConfigMap for Solace Browser configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: solace-browser-config
data:
  # Platform-specific selectors (discovered during pilot)
  reddit_selectors.json: |
    {
      "search_box": "input[placeholder='Search Reddit']",
      "post_links": "a[data-testid='search-result-title']",
      "username": "span[data-testid='post-author']",
      "timestamp": "span[data-testid='post-timestamp']"
    }

  twitter_selectors.json: |
    {
      "search_box": "input[placeholder='Search Twitter']",
      "profile_links": "a[href*='/']",
      "username": "span:has-text('@')",
      "follower_count": "span:has-text('followers')"
    }

  linkedin_selectors.json: |
    {
      "search_box": "input[placeholder='Search']",
      "profile_links": "a[href*='/in/']",
      "headline": "h3[class*='headline']",
      "company": "p[class*='company']"
    }

  github_selectors.json: |
    {
      "search_box": "input[placeholder='Search GitHub']",
      "user_links": "a[data-testid='user-card-link']",
      "username": "span[class*='username']",
      "bio": "p[class*='bio']"
    }

  hackernews_selectors.json: |
    {
      "user_links": "a.hnuser",
      "submission": "span.score",
      "comment_count": "a.hnuser + a"
    }

---

# Network Policy to allow only necessary egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: solace-browser-netpol
spec:
  podSelector:
    matchLabels:
      app: solace-browser-phase2
  policyTypes:
  - Egress
  egress:
  # Allow DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
  # Allow HTTPS to public internet
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
    ports:
    - protocol: TCP
      port: 443
  # Allow HTTP (for some sites)
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
    ports:
    - protocol: TCP
      port: 80
  # Allow Anti-Captcha API
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0  # Anti-Captcha IPs
    ports:
    - protocol: TCP
      port: 443

---

# Cloud Tasks Queue for CAPTCHA solving
apiVersion: cloudtasks.cnrm.cloud.google.com/v1beta1
kind: CloudTasksQueue
metadata:
  name: solace-captcha-queue
spec:
  displayName: "CAPTCHA solving queue for Solace Browser Phase 2"
  location: us-central1
  rateLimits:
    maxConcurrentDispatches: 10
    maxDispatchesPerSecond: 5
  retryConfig:
    maxAttempts: 3
    maxRetryDuration: "600s"
    minBackoff: "0.1s"
    maxBackoff: "600s"

---

# Cloud Logging Sink for Solace Browser logs
apiVersion: logging.cnrm.cloud.google.com/v1beta1
kind: LoggingLogSink
metadata:
  name: solace-browser-logs
spec:
  destination: logging.googleapis.com/projects/PROJECT_ID/logs/solace-browser-phase2
  filter: |
    resource.type="cloud_run_revision"
    resource.labels.service_name="solace-browser-phase2"
  includeChildren: true

---

# Cloud Monitoring Alert Policy
apiVersion: monitoring.cnrm.cloud.google.com/v1beta1
kind: MonitoringAlertPolicy
metadata:
  name: solace-browser-alerts
spec:
  displayName: "Solace Browser Phase 2 Alerts"
  conditions:
  - displayName: "High Error Rate"
    conditionThreshold:
      filter: |
        resource.type = "cloud_run_revision"
        metric.type = "run.googleapis.com/request_count"
        AND metric.response_code_class = "5xx"
      comparison: COMPARISON_GT
      thresholdValue: 10
      duration: "60s"
  - displayName: "Memory Threshold"
    conditionThreshold:
      filter: |
        resource.type = "cloud_run_revision"
        metric.type = "run.googleapis.com/container_memory_utilization"
      comparison: COMPARISON_GT
      thresholdValue: 0.9
      duration: "300s"
  - displayName: "CAPTCHA Solver Queue Backup"
    conditionThreshold:
      filter: |
        resource.type = "cloud_tasks_queue"
        metric.type = "cloudtasks.googleapis.com/queue/oldest_estimated_lease_expiration_time"
      comparison: COMPARISON_GT
      thresholdValue: 300000  # 5 minutes in milliseconds
      duration: "300s"
  notificationChannels:
  - "projects/PROJECT_ID/notificationChannels/CHANNEL_ID"

---

# Deployment Instructions
#
# 1. Set environment variables:
#    export PROJECT_ID="your-gcp-project"
#    export REGION="us-central1"
#
# 2. Create secrets (one-time):
#    kubectl create secret generic solace-secrets \
#      --from-literal=anti-captcha-api-key=YOUR_KEY \
#      --from-literal=twitter-bearer-token=YOUR_TOKEN \
#      --from-literal=github-token=YOUR_TOKEN \
#      --from-literal=linkedin-session=YOUR_SESSION
#
# 3. Build and push Docker image:
#    docker build -t gcr.io/$PROJECT_ID/solace-browser:phase2 .
#    docker push gcr.io/$PROJECT_ID/solace-browser:phase2
#
# 4. Deploy to Cloud Run:
#    gcloud run deploy solace-browser-phase2 \
#      --image=gcr.io/$PROJECT_ID/solace-browser:phase2 \
#      --platform=managed \
#      --region=$REGION \
#      --memory=2Gi \
#      --cpu=2 \
#      --max-instances=10 \
#      --set-env-vars=BROWSER_HEADLESS=true
#
# 5. Monitor deployment:
#    gcloud run services describe solace-browser-phase2 \
#      --platform=managed \
#      --region=$REGION
#
# 6. View logs:
#    gcloud logging read \
#      "resource.type=cloud_run_revision AND resource.labels.service_name=solace-browser-phase2" \
#      --limit=100 \
#      --format=json
#
# 7. Scale for full crawl (Week 4-6):
#    gcloud run services update solace-browser-phase2 \
#      --max-instances=15 \
#      --region=$REGION
