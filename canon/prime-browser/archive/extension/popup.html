<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Solace Browser Control</title>
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 16px;
      color: #333;
    }
    .status {
      padding: 10px;
      margin: 10px 0;
      border-radius: 4px;
      font-size: 12px;
      line-height: 1.5;
    }
    .connected {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .disconnected {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .recording {
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffeeba;
    }
    button {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
      border: none;
      border-radius: 4px;
      background: #007bff;
      color: white;
      cursor: pointer;
      font-size: 12px;
    }
    button:hover {
      background: #0056b3;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .info {
      font-size: 11px;
      color: #666;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h2>🌐 Solace Browser</h2>

  <div id="status" class="status disconnected">
    <strong>Status:</strong> <span id="connection">Disconnected</span><br>
    <strong>Recording:</strong> <span id="recording">Inactive</span><br>
    <strong>Session:</strong> <span id="session">None</span>
  </div>

  <div>
    <button id="startBtn" onclick="startRecording()">▶ Start Recording</button>
    <button id="stopBtn" onclick="stopRecording()" disabled>⏹ Stop Recording</button>
  </div>

  <div class="info">
    <p>🔌 <strong>WebSocket:</strong> ws://localhost:9222</p>
    <p>📍 <strong>Extension:</strong> v0.1.0</p>
    <p>Connected via solace_cli.sh</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
