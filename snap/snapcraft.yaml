name: solace-browser
base: core22
version: '1.0.0'
summary: Yinyang Server — AI automation backend for Solace Browser
description: |
  Solace Browser is a portable Linux runtime that bundles the real Chromium
  browser, Solace Hub, Yinyang Server, and the default app/runtime assets.
  Hub starts first, owns localhost:8888, and launches the Browser second.

  Features:
  - Hub-first control plane on localhost:8888
  - Native Yinyang sidebar inside the Browser
  - Hash-chained tamper-evident evidence vault
  - Local-first automation and agent control

grade: stable
confinement: strict

apps:
  solace-browser:
    command: solace-browser-release/solace-hub
    plugs:
      - network
      - network-bind
      - home
      - desktop
      - desktop-legacy
      - x11

parts:
  portable-release:
    plugin: nil
    source: .
    override-build: |
      TARBALL="dist/solace-browser-chromium-linux-x86_64.tar.gz"
      if [ ! -f "${TARBALL}" ]; then
        echo "ERROR: Portable bundle not found at ${TARBALL}" >&2
        echo "Run: bash scripts/release_browser_cycle.sh" >&2
        exit 1
      fi
      mkdir -p "${SNAPCRAFT_PART_INSTALL}"
      tar -xzf "${TARBALL}" -C "${SNAPCRAFT_PART_INSTALL}"
    stage-packages:
      - libwebkit2gtk-4.0-37
      - libgtk-3-0
