id: solace-design
name: Solace Design
version: 1.0.0
domain: localhost
category: backoffice
description: "Design worker app for the Solace Dev role architecture — produces page, state, and component design specs from bounded manager assignments"
author: system
roles:
  - design

backoffice:
  tables:
    - name: design_specs
      display:
        title: "Design Specs"
        badge: status
      search: ["page_scope", "spec_type", "status"]
      columns:
        - name: assignment_id
          type: text
          required: true
        - name: project_id
          type: text
          required: true
        - name: page_scope
          type: text
          required: true
        - name: state_scope
          type: text
        - name: spec_type
          type: enum
          values: ["page_map", "ui_state", "component_state", "handoff"]
          required: true
        - name: content
          type: text
          required: true
        - name: status
          type: enum
          values: ["draft", "proposed", "approved", "rejected"]
          required: true

    - name: design_reviews
      display:
        title: "Design Reviews"
        badge: verdict
      search: ["reviewer_role", "verdict", "notes"]
      columns:
        - name: spec_id
          type: ref:design_specs
          required: true
        - name: reviewer_role
          type: text
          required: true
        - name: verdict
          type: enum
          values: ["approved", "rejected", "needs_revision"]
          required: true
        - name: notes
          type: text

  views:
    - name: All Design Specs
      type: table
      table: design_specs
      order_by: "created_at DESC"
    - name: Pending Reviews
      type: kanban
      table: design_reviews
      group_by: verdict
