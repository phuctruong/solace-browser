id: solace-dev-manager
name: Solace Dev Manager
version: 1.0.0
domain: localhost
category: backoffice
description: "Manager workspace schema and worker app for the Solace Dev role architecture"
author: system
roles:
  - manager

backoffice:
  tables:
    - name: projects
      display:
        title: "Managed Projects"
      search: ["id", "name", "repository"]
      columns:
        - name: name
          type: text
          required: true
        - name: repository
          type: text
        - name: description
          type: text

    - name: requests
      display:
        title: "Work Requests"
        badge: status
      search: ["title", "ticket_type", "status"]
      columns:
        - name: project_id
          type: ref:projects
          required: true
        - name: ticket_type
          type: enum
          values: ["bug", "feature", "chore"]
          required: true
        - name: title
          type: text
          required: true
        - name: status
          type: enum
          values: ["open", "mapped", "assigned", "closed"]
          required: true

    - name: assignments
      display:
        title: "Role Assignments"
        badge: target_role
      search: ["details", "target_role", "status"]
      columns:
        - name: request_id
          type: ref:requests
          required: true
        - name: target_role
          type: enum
          values: ["design", "coder", "qa"]
          required: true
        - name: details
          type: text
          required: true
        - name: status
          type: enum
          values: ["pending", "active", "review", "done"]
          required: true

    - name: artifacts
      display:
        title: "Evidence Artifacts"
      search: ["file_path", "evidence_hash"]
      columns:
        - name: assignment_id
          type: ref:assignments
          required: true
        - name: file_path
          type: text
          required: true
        - name: evidence_hash
          type: text
          required: true

    - name: approvals
      display:
        title: "Approvals"
        badge: status
      search: ["notes", "approver_role"]
      columns:
        - name: assignment_id
          type: ref:assignments
          required: true
        - name: approver_role
          type: text
          required: true
        - name: status
          type: enum
          values: ["approved", "rejected", "pending"]
          required: true
        - name: notes
          type: text

    - name: worker_inboxes
      display:
        title: "Worker Inboxes"
        badge: status
      search: ["to_role", "context_sources", "status"]
      columns:
        - name: assignment_id
          type: ref:assignments
          required: true
        - name: to_role
          type: text
          required: true
        - name: context_sources
          type: text
          required: true
        - name: file_targets
          type: text
        - name: required_artifacts
          type: text
          required: true
        - name: constraints
          type: text
        - name: status
          type: enum
          values: ["prepared", "loaded", "acted_on", "archived"]
          required: true

    - name: runs
      display:
        title: "Workflow Runs"
        badge: status
      search: ["run_id", "role", "executor", "status"]
      columns:
        - name: assignment_id
          type: ref:assignments
          required: true
        - name: inbox_id
          type: ref:worker_inboxes
        - name: role
          type: text
          required: true
        - name: executor
          type: text
          required: true
        - name: run_id
          type: text
          required: true
        - name: status
          type: enum
          values: ["queued", "running", "passed", "failed", "blocked"]
          required: true
        - name: evidence_ref
          type: text

    - name: releases
      display:
        title: "Releases"
      search: ["version", "evidence_bundle"]
      columns:
        - name: project_id
          type: ref:projects
          required: true
        - name: source_assignment_id
          type: ref:assignments
        - name: source_run_id
          type: text
        - name: version
          type: text
          required: true
        - name: status
          type: enum
          values: ["ready", "shipped", "canceled"]
          required: true
        - name: approved_by
          type: text
        - name: evidence_bundle
          type: text
          required: true

    - name: memory_entries
      display:
        title: "Memory Entries"
        badge: status
      search: ["title", "role", "status"]
      columns:
        - name: request_id
          type: ref:requests
          required: true
        - name: assignment_id
          type: ref:assignments
          required: true
        - name: project_id
          type: ref:projects
          required: true
        - name: role
          type: text
          required: true
        - name: run_id
          type: text
        - name: entry_type
          type: enum
          values: ["convention", "decision", "evidence_bundle", "failure_pattern"]
          required: true
        - name: title
          type: text
          required: true
        - name: summary
          type: text
          required: true
        - name: status
          type: enum
          values: ["candidate", "promoted", "rejected", "superseded"]
          required: true
        - name: artifact_refs
          type: text

    - name: conventions
      display:
        title: "Conventions"
        badge: status
      search: ["name", "source_role", "status"]
      columns:
        - name: memory_entry_id
          type: ref:memory_entries
          required: true
        - name: source_role
          type: text
          required: true
        - name: name
          type: text
          required: true
        - name: trigger
          type: text
          required: true
        - name: scope
          type: text
          required: true
        - name: proof_basis
          type: text
          required: true
        - name: status
          type: enum
          values: ["candidate", "active", "deprecated", "orphan"]
          required: true

    - name: design_handoffs
      display:
        title: "Design Handoffs"
        badge: status
      search: ["target_pages", "expected_artifacts", "status"]
      columns:
        - name: request_id
          type: ref:requests
          required: true
        - name: assignment_id
          type: ref:assignments
          required: true
        - name: project_id
          type: ref:projects
          required: true
        - name: target_pages
          type: text
          required: true
        - name: state_scope
          type: text
        - name: constraints
          type: text
        - name: expected_artifacts
          type: text
          required: true
        - name: status
          type: enum
          values: ["pending", "accepted", "completed"]
          required: true

    - name: coder_handoffs
      display:
        title: "Coder Handoffs"
        badge: status
      search: ["target_files", "expected_artifacts", "status"]
      columns:
        - name: request_id
          type: ref:requests
          required: true
        - name: assignment_id
          type: ref:assignments
          required: true
        - name: project_id
          type: ref:projects
          required: true
        - name: design_spec_refs
          type: text
          required: true
        - name: target_files
          type: text
          required: true
        - name: page_scope
          type: text
        - name: state_scope
          type: text
        - name: constraints
          type: text
        - name: expected_artifacts
          type: text
          required: true
        - name: status
          type: enum
          values: ["pending", "accepted", "completed"]
          required: true

    - name: qa_handoffs
      display:
        title: "QA Handoffs"
        badge: status
      search: ["code_run_refs", "expected_artifacts", "status"]
      columns:
        - name: request_id
          type: ref:requests
          required: true
        - name: assignment_id
          type: ref:assignments
          required: true
        - name: project_id
          type: ref:projects
          required: true
        - name: code_run_refs
          type: text
          required: true
        - name: design_spec_refs
          type: text
          required: true
        - name: assertions
          type: text
        - name: evidence_refs
          type: text
        - name: constraints
          type: text
        - name: expected_artifacts
          type: text
          required: true
        - name: status
          type: enum
          values: ["pending", "accepted", "completed"]
          required: true

  views:
    - name: All Requests
      type: table
      table: requests
      order_by: "created_at DESC"
    - name: Open Assignments
      type: kanban
      table: assignments
      group_by: status
    - name: Worker Inboxes
      type: kanban
      table: worker_inboxes
      group_by: status
    - name: Workflow Runs
      type: kanban
      table: runs
      group_by: status
    - name: Memory Queue
      type: kanban
      table: memory_entries
      group_by: status
    - name: Convention Status
      type: kanban
      table: conventions
      group_by: status
