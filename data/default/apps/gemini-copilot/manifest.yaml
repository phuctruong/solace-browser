id: gemini-copilot
name: Gemini Copilot
description: Send prompts to Gemini web interface, capture responses for cross-LLM QA.
category: productivity
status: installed
safety: B
site: gemini.google.com
type: standard
orchestrates: []
scopes:
- gemini.read.conversation
- gemini.draft.message
- local.evidence
partners:
  produces_for: []
  consumes_from: []
required_inbox:
  prompts: []
  templates: []
  assets: []
  policies: []
  datasets: []
  requests: []
  conventions:
    config: config.yaml
    defaults: defaults.yaml
keep_alive:
  url: https://gemini.google.com
  interval_min: 30
