id: whatsapp-unread
name: WhatsApp — Unread Checker
description: Checks WhatsApp unread count every 5 minutes. Reports to morning-brief.
category: messaging
status: available
safety: B
tier: pro
tier_reason: "Messaging session persistence requires Pro tier"
site: web.whatsapp.com
type: standard
orchestrates: []
scopes:
  - whatsapp.read.messages
  - local.evidence
partners:
  produces_for:
    - morning-brief
    - weekly-digest
  consumes_from: []
required_inbox:
  conventions:
    config: config.yaml
    defaults: defaults.yaml
