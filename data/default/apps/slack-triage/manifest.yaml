id: slack-triage
name: Slack Triage
description: Summarize channels, draft responses, and escalate urgent items.
category: communications
status: installed
safety: B
site: app.slack.com
type: standard
orchestrates: []
scopes:
- slack.read.channels
- slack.write.drafts
- local.evidence
partners:
  produces_for:
  - morning-brief
  consumes_from:
  - gmail-inbox-triage
  - github-issue-triage
required_inbox:
  prompts: []
  templates: []
  assets: []
  policies: []
  datasets: []
  requests: []
  conventions:
    config: config.yaml
    defaults: defaults.yaml
keep_alive:
  url: https://app.slack.com/
  interval_min: 20
