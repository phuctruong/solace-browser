id: whatsapp-responder
name: WhatsApp Responder
description: Prepare responses in WhatsApp Web with explicit approval.
category: communications
status: installed
safety: C
site: web.whatsapp.com
type: standard
orchestrates: []
scopes:
- whatsapp.read.messages
- whatsapp.write.drafts
- local.evidence
partners:
  produces_for: []
  consumes_from:
  - morning-brief
required_inbox:
  prompts: []
  templates: []
  assets: []
  policies: []
  datasets: []
  requests: []
  conventions:
    config: config.yaml
    defaults: defaults.yaml
keep_alive:
  url: https://web.whatsapp.com/
  interval_min: 15
