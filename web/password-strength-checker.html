<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Strength Checker</title>
  <link rel="stylesheet" href="/web/css/password-strength-checker.css">
</head>
<body>
<div class="psc-container">
  <h1 class="psc-title">Password Strength Checker</h1>
  <p class="psc-subtitle">Analyze password strength without storing raw passwords. All passwords stored as SHA-256 hashes only.</p>

  <form class="psc-form" id="psc-form">
    <input type="password" id="psc-password" placeholder="Enter password to analyze" autocomplete="new-password">
    <input type="url" id="psc-url" placeholder="Page URL (optional)">
    <button type="submit" class="psc-btn psc-btn-primary">Analyze</button>
  </form>

  <div class="psc-result" id="psc-result"></div>
  <div class="psc-status" id="psc-status"></div>

  <h2 style="font-size:1.1rem;color:var(--hub-text);margin:16px 0 8px;">Analysis History</h2>
  <div class="psc-panel" id="psc-panel">Loading...</div>
</div>
<script src="/web/js/password-strength-checker.js"></script>
</body>
</html>
