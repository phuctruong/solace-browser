<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Strength Checker — Solace Hub</title>
<link rel="stylesheet" href="/web/css/password-strength-checker.css">
</head>
<body>
<div class="psc-container">
  <h1 class="psc-title">Password Strength Checker</h1>
  <p class="psc-subtitle">Check password strength with privacy-preserving hashing — raw passwords never stored</p>

  <section class="psc-section">
    <h2 class="psc-section-title">Check a Password</h2>
    <form id="psc-check-form" class="psc-form">
      <input id="psc-password" class="psc-input" type="password" placeholder="Enter password to check" aria-label="Password">
      <select id="psc-score" class="psc-input" aria-label="Score (0-5)">
        <option value="0">0 — Very Weak</option>
        <option value="1">1 — Weak</option>
        <option value="2">2 — Fair</option>
        <option value="3">3 — Fair+</option>
        <option value="4">4 — Strong</option>
        <option value="5">5 — Very Strong</option>
      </select>
      <label class="psc-check-label"><input type="checkbox" id="psc-uppercase"> Uppercase</label>
      <label class="psc-check-label"><input type="checkbox" id="psc-numbers"> Numbers</label>
      <label class="psc-check-label"><input type="checkbox" id="psc-symbols"> Symbols</label>
      <button type="submit" class="psc-btn psc-btn-primary">Check</button>
    </form>
  </section>

  <section class="psc-section">
    <h2 class="psc-section-title">Strength Levels</h2>
    <div id="psc-levels-row" class="psc-badges" aria-live="polite"></div>
  </section>

  <section class="psc-section">
    <h2 class="psc-section-title">Stats</h2>
    <div id="psc-stats" class="psc-stats-grid" aria-live="polite"></div>
  </section>

  <section class="psc-section">
    <h2 class="psc-section-title">Check History</h2>
    <div id="psc-checks-list" class="psc-list" aria-live="polite"></div>
  </section>

  <div id="psc-status" class="psc-status" aria-live="polite"></div>
</div>
<script src="/web/js/password-strength-checker.js"></script>
</body>
</html>
