<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Performance Profiler — Solace Hub</title>
<link rel="stylesheet" href="/web/css/performance-profiler.css">
</head>
<body>
<div class="pp-page">
  <div class="page-header">
    <h1 class="page-title">Performance Profiler</h1>
    <button id="btn-pp-refresh" class="btn-secondary">Refresh</button>
  </div>
  <div class="pp-section">
    <h2 class="section-title">New Session</h2>
    <div class="pp-form">
      <input id="pp-page-hash" class="form-input" placeholder="Page SHA-256 hash (64 chars)" maxlength="64">
      <button id="btn-pp-create" class="btn-primary">Start Session</button>
    </div>
  </div>
  <div class="pp-section">
    <h2 class="section-title">Aggregates</h2>
    <div id="pp-aggregates" class="pp-aggregates" aria-live="polite"></div>
  </div>
  <div class="pp-section">
    <h2 class="section-title">Sessions</h2>
    <div id="pp-sessions" class="pp-sessions" aria-live="polite"></div>
  </div>
  <div id="pp-status" class="pp-status" aria-live="polite"></div>
</div>
<script src="/web/js/performance-profiler.js"></script>
</body>
</html>
