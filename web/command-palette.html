<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Command Palette — Solace Hub</title>
<link rel="stylesheet" href="/web/css/command-palette.css">
</head>
<body>
<div class="cp-backdrop" id="cp-backdrop" role="dialog" aria-modal="true" aria-label="Command Palette">
  <div class="cp-modal">
    <input
      type="text"
      id="cp-input"
      class="cp-input"
      placeholder="Type a command..."
      autocomplete="off"
      aria-label="Search commands"
    >
    <div id="cp-recent" class="cp-section">
      <div class="cp-section-label">Recent</div>
      <ul id="cp-recent-list" class="cp-list" role="listbox"></ul>
    </div>
    <div id="cp-results" class="cp-section">
      <div class="cp-section-label">Commands</div>
      <ul id="cp-list" class="cp-list" role="listbox" aria-label="Commands"></ul>
    </div>
  </div>
</div>
<script src="/web/js/command-palette.js"></script>
</body>
</html>
