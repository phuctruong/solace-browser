<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download Manager — Solace Hub</title>
<link rel="stylesheet" href="/web/css/download-manager-v2.css">
</head>
<body>
<div class="dm-container">
  <h1 class="dm-title">Download Manager</h1>
  <p class="dm-subtitle">Manage queued and completed downloads</p>
  <div class="dm-toolbar">
    <button id="btn-dm-queue" class="dm-btn dm-btn-primary">Queue</button>
    <button id="btn-dm-history" class="dm-btn dm-btn-secondary">History</button>
    <button id="btn-dm-types" class="dm-btn dm-btn-secondary">File Types</button>
  </div>
  <div id="dm-panel" class="dm-panel" aria-live="polite"></div>
  <div id="dm-status" class="dm-status" aria-live="polite"></div>
</div>
<script src="/web/js/download-manager-v2.js"></script>
</body>
</html>
