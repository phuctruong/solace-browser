<!-- Diagram: 02-dashboard-login -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Schedules — Solace Hub</title>
  <style>
    :root {
      --hub-bg: #0f1117;
      --hub-surface: #1a1d27;
      --hub-text: #e8eaf0;
      --hub-text-muted: #8b90a0;
      --hub-border: #2a2d3a;
      --hub-accent: #6c63ff;
      --hub-success: #22c55e;
      --hub-warning: #f59e0b;
      --hub-danger: #ef4444;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--hub-bg);
      color: var(--hub-text);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      padding: 24px;
    }

    h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; color: var(--hub-text); }
    h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: var(--hub-text); }

    .page-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--hub-border);
    }
    .page-header a {
      color: var(--hub-text-muted);
      text-decoration: none;
      font-size: 13px;
    }
    .page-header a:hover { color: var(--hub-accent); }

    .section {
      background: var(--hub-surface);
      border: 1px solid var(--hub-border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 12px; font-weight: 600; color: var(--hub-text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .form-group input,
    .form-group select {
      background: var(--hub-bg);
      border: 1px solid var(--hub-border);
      border-radius: 6px;
      color: var(--hub-text);
      font-size: 14px;
      padding: 8px 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--hub-accent);
    }

    .preview-box {
      background: var(--hub-bg);
      border: 1px solid var(--hub-border);
      border-radius: 6px;
      padding: 10px 14px;
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--hub-text-muted);
      min-height: 36px;
    }
    .preview-box.valid { border-color: var(--hub-success); color: var(--hub-text); }
    .preview-box.invalid { border-color: var(--hub-danger); color: var(--hub-danger); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--hub-accent); color: #fff; }
    .btn-danger  { background: var(--hub-danger); color: #fff; }
    .btn-warning { background: var(--hub-warning); color: #000; }
    .btn-success { background: var(--hub-success); color: #000; }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--hub-border);
      color: var(--hub-text-muted);
    }
    .btn-ghost:hover { border-color: var(--hub-accent); color: var(--hub-accent); }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead th {
      text-align: left;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 700;
      color: var(--hub-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid var(--hub-border);
    }
    tbody tr { border-bottom: 1px solid var(--hub-border); }
    tbody tr:last-child { border-bottom: none; }
    tbody td { padding: 10px 12px; color: var(--hub-text); vertical-align: middle; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 700;
    }
    .badge-active { background: color-mix(in srgb, var(--hub-success) 20%, transparent); color: var(--hub-success); }
    .badge-paused { background: color-mix(in srgb, var(--hub-warning) 20%, transparent); color: var(--hub-warning); }
    .badge-ok     { background: color-mix(in srgb, var(--hub-success) 20%, transparent); color: var(--hub-success); }
    .badge-fail   { background: color-mix(in srgb, var(--hub-danger) 20%, transparent); color: var(--hub-danger); }

    .actions { display: flex; gap: 6px; flex-wrap: wrap; }

    .toast-area {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 9999;
    }
    .toast {
      background: var(--hub-surface);
      border: 1px solid var(--hub-border);
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 13px;
      color: var(--hub-text);
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      animation: slide-in 0.2s ease;
    }
    .toast.success { border-color: var(--hub-success); }
    .toast.error   { border-color: var(--hub-danger); }
    @keyframes slide-in { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .empty-row td { text-align: center; color: var(--hub-text-muted); padding: 24px; }

    #refresh-note { font-size: 11px; color: var(--hub-text-muted); margin-top: 8px; }
  </style>
</head>
<body>
<div class="page-header">
  <a href="/health">← Solace Hub</a>
  <h1>Schedule Timezone Manager</h1>
</div>

<!-- Section 1: Create Schedule -->
<div class="section">
  <h2>Create Schedule</h2>
  <form id="create-form">
    <div class="form-row">
      <div class="form-group">
        <label for="sched-name">Schedule Name</label>
        <input id="sched-name" type="text" placeholder="Morning Report" maxlength="128" required>
      </div>
      <div class="form-group">
        <label for="sched-cron">Cron Expression</label>
        <input id="sched-cron" type="text" placeholder="0 9 * * *" maxlength="64" value="0 9 * * *">
      </div>
    </div>
    <div class="form-group" style="margin-bottom:16px;">
      <label for="sched-tz">Timezone</label>
      <select id="sched-tz">
        <option value="UTC">UTC</option>
        <option value="America/New_York">America/New_York</option>
        <option value="America/Chicago">America/Chicago</option>
        <option value="America/Denver">America/Denver</option>
        <option value="America/Los_Angeles">America/Los_Angeles</option>
        <option value="America/Sao_Paulo">America/Sao_Paulo</option>
        <option value="Europe/London">Europe/London</option>
        <option value="Europe/Paris">Europe/Paris</option>
        <option value="Europe/Berlin">Europe/Berlin</option>
        <option value="Europe/Moscow">Europe/Moscow</option>
        <option value="Asia/Dubai">Asia/Dubai</option>
        <option value="Asia/Kolkata">Asia/Kolkata</option>
        <option value="Asia/Bangkok">Asia/Bangkok</option>
        <option value="Asia/Singapore">Asia/Singapore</option>
        <option value="Asia/Tokyo">Asia/Tokyo</option>
        <option value="Asia/Shanghai">Asia/Shanghai</option>
        <option value="Australia/Sydney">Australia/Sydney</option>
        <option value="Pacific/Auckland">Pacific/Auckland</option>
        <option value="Africa/Cairo">Africa/Cairo</option>
        <option value="Africa/Lagos">Africa/Lagos</option>
      </select>
    </div>
    <div>
      <label style="font-size:12px;font-weight:600;color:var(--hub-text-muted);text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:6px;">Next 3 Runs Preview</label>
      <div class="preview-box" id="cron-preview">Enter a cron expression above to preview next runs.</div>
    </div>
    <div style="margin-top:16px;">
      <button type="submit" class="btn btn-primary">+ Create Schedule</button>
    </div>
  </form>
</div>

<!-- Section 2: Active Schedules Table -->
<div class="section">
  <h2>Active Schedules</h2>
  <table id="schedules-table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Cron</th>
        <th>Timezone</th>
        <th>Next Run</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="schedules-body">
      <tr class="empty-row"><td colspan="6">Loading schedules…</td></tr>
    </tbody>
  </table>
  <p id="refresh-note">Auto-refreshes every 30 seconds.</p>
</div>

<!-- Section 3: Run History -->
<div class="section">
  <h2>Run History</h2>
  <table id="history-table">
    <thead>
      <tr>
        <th>Schedule</th>
        <th>Triggered At (local)</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="history-body">
      <tr class="empty-row"><td colspan="3">Loading history…</td></tr>
    </tbody>
  </table>
</div>

<div class="toast-area" id="toast-area"></div>

<script>
(function () {
  'use strict';

  /* ---- Cron next-run calculator (no library) ---- */
  function nextRuns(cronStr, tz, count) {
    count = count || 3;
    var parts = cronStr.trim().split(/\s+/);
    if (parts.length !== 5) return [];
    var minutePart = parts[0];
    var hourPart   = parts[1];
    var domPart    = parts[2];
    var monthPart  = parts[3];
    var dowPart    = parts[4];

    function matchField(val, part, min, max) {
      if (part === '*') return true;
      if (part.startsWith('*/')) {
        var step = parseInt(part.slice(2), 10);
        if (isNaN(step) || step <= 0) return false;
        return (val - min) % step === 0;
      }
      var n = parseInt(part, 10);
      return !isNaN(n) && n === val;
    }

    var results = [];
    var now = new Date();
    var cursor = new Date(now.getTime() + 60000);
    cursor.setSeconds(0, 0);

    var limit = 0;
    while (results.length < count && limit < 1440 * 7) {
      limit++;
      var min = cursor.getMinutes();
      var hr  = cursor.getHours();
      var dom = cursor.getDate();
      var mo  = cursor.getMonth() + 1;
      var dow = cursor.getDay();

      if (
        matchField(min, minutePart, 0, 59) &&
        matchField(hr,  hourPart,   0, 23) &&
        matchField(dom, domPart,    1, 31) &&
        matchField(mo,  monthPart,  1, 12) &&
        matchField(dow, dowPart,    0,  6)
      ) {
        try {
          var label = cursor.toLocaleString('en-US', {
            timeZone: tz,
            year:   'numeric',
            month:  'short',
            day:    'numeric',
            hour:   '2-digit',
            minute: '2-digit',
            timeZoneName: 'short'
          });
          results.push(label);
        } catch (e) {
          results.push(cursor.toISOString());
        }
      }
      cursor = new Date(cursor.getTime() + 60000);
    }
    return results;
  }

  /* ---- Toast notifications ---- */
  function toast(msg, type) {
    var area = document.getElementById('toast-area');
    var el = document.createElement('div');
    el.className = 'toast ' + (type || '');
    el.textContent = msg;
    area.appendChild(el);
    setTimeout(function () { el.remove(); }, 3500);
  }

  /* ---- Cron preview live update ---- */
  var cronInput  = document.getElementById('sched-cron');
  var tzSelect   = document.getElementById('sched-tz');
  var previewEl  = document.getElementById('cron-preview');

  function updatePreview() {
    var cron = cronInput.value.trim();
    var tz   = tzSelect.value || 'UTC';
    if (!cron) {
      previewEl.textContent = 'Enter a cron expression to preview next runs.';
      previewEl.className = 'preview-box';
      return;
    }
    var runs = nextRuns(cron, tz, 3);
    if (runs.length === 0) {
      previewEl.textContent = 'Invalid cron expression.';
      previewEl.className = 'preview-box invalid';
    } else {
      previewEl.textContent = runs.join(' | ');
      previewEl.className = 'preview-box valid';
    }
  }
  cronInput.addEventListener('input', updatePreview);
  tzSelect.addEventListener('change', updatePreview);
  updatePreview();

  /* ---- API helpers ---- */
  function apiFetch(path, opts) {
    var url = 'http://localhost:8888' + path;
    return fetch(url, Object.assign({ headers: { 'Content-Type': 'application/json' } }, opts || {}));
  }

  /* ---- Load + render schedules ---- */
  function renderSchedules(schedules) {
    var tbody = document.getElementById('schedules-body');
    if (!schedules || schedules.length === 0) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="6">No schedules yet. Create one above.</td></tr>';
      return;
    }
    tbody.innerHTML = schedules.map(function (s) {
      var tz     = s.tz || 'UTC';
      var cron   = s.cron || '';
      var name   = s.name || s.app_id || s.id || '—';
      var enabled = s.enabled !== false;
      var status = enabled ? '<span class="badge badge-active">Active</span>' : '<span class="badge badge-paused">Paused</span>';
      var runs   = nextRuns(cron, tz, 1);
      var nextRun = runs.length > 0 ? runs[0] : '—';
      var pauseBtn = enabled
        ? '<button class="btn btn-warning btn-sm" onclick="patchSchedule(\'' + s.id + '\',\'pause\')">Pause</button>'
        : '<button class="btn btn-success btn-sm" onclick="patchSchedule(\'' + s.id + '\',\'resume\')">Resume</button>';
      var deleteBtn = '<button class="btn btn-danger btn-sm" onclick="deleteSchedule(\'' + s.id + '\')">Delete</button>';
      return '<tr>' +
        '<td>' + escHtml(name) + '</td>' +
        '<td><code>' + escHtml(cron) + '</code></td>' +
        '<td>' + escHtml(tz) + '</td>' +
        '<td style="font-size:12px;">' + escHtml(nextRun) + '</td>' +
        '<td>' + status + '</td>' +
        '<td><div class="actions">' + pauseBtn + deleteBtn + '</div></td>' +
        '</tr>';
    }).join('');
  }

  function loadSchedules() {
    apiFetch('/api/v1/browser/schedules')
      .then(function (r) { return r.json(); })
      .then(function (data) { renderSchedules(data.schedules || []); })
      .catch(function () {
        document.getElementById('schedules-body').innerHTML =
          '<tr class="empty-row"><td colspan="6">Unable to reach Yinyang Server.</td></tr>';
      });
  }

  /* ---- Patch (pause/resume) schedule ---- */
  window.patchSchedule = function (id, action) {
    apiFetch('/api/v1/schedules/' + id, {
      method: 'PATCH',
      body: JSON.stringify({ action: action })
    }).then(function (r) {
      if (r.ok) {
        toast(action === 'pause' ? 'Schedule paused.' : 'Schedule resumed.', 'success');
        loadSchedules();
      } else {
        toast('Failed to ' + action + ' schedule.', 'error');
      }
    }).catch(function () { toast('Network error.', 'error'); });
  };

  /* ---- Delete schedule ---- */
  window.deleteSchedule = function (id) {
    apiFetch('/api/v1/browser/schedules/' + id, { method: 'DELETE' })
      .then(function (r) {
        if (r.ok) {
          toast('Schedule deleted.', 'success');
          loadSchedules();
        } else {
          toast('Failed to delete schedule.', 'error');
        }
      }).catch(function () { toast('Network error.', 'error'); });
  };

  /* ---- Create schedule form ---- */
  document.getElementById('create-form').addEventListener('submit', function (e) {
    e.preventDefault();
    var name = document.getElementById('sched-name').value.trim();
    var cron = document.getElementById('sched-cron').value.trim();
    var tz   = document.getElementById('sched-tz').value || 'UTC';
    if (!name || !cron) { toast('Name and cron are required.', 'error'); return; }
    apiFetch('/api/v1/schedules', {
      method: 'POST',
      body: JSON.stringify({ name: name, cron: cron, tz: tz })
    }).then(function (r) {
      if (r.status === 201 || r.status === 200) {
        toast('Schedule created.', 'success');
        document.getElementById('sched-name').value = '';
        loadSchedules();
      } else {
        r.json().then(function (d) { toast('Error: ' + (d.error || 'unknown'), 'error'); });
      }
    }).catch(function () { toast('Network error.', 'error'); });
  });

  /* ---- Run history ---- */
  function loadHistory() {
    apiFetch('/api/v1/evidence/log?type=schedule')
      .then(function (r) { return r.json(); })
      .then(function (data) {
        var entries = (data.entries || data.log || []).slice(0, 10);
        var tbody = document.getElementById('history-body');
        if (entries.length === 0) {
          tbody.innerHTML = '<tr class="empty-row"><td colspan="3">No schedule history yet.</td></tr>';
          return;
        }
        tbody.innerHTML = entries.map(function (e) {
          var name = e.name || e.schedule_name || e.app_id || '—';
          var ts   = e.triggered_at || e.ts || e.timestamp || '';
          var local = ts ? new Date(typeof ts === 'number' ? ts * 1000 : ts).toLocaleString() : '—';
          var ok   = e.status === 'ok' || e.status === 'success' || e.action === 'schedule_created';
          var badge = ok
            ? '<span class="badge badge-ok">ok</span>'
            : '<span class="badge badge-fail">fail</span>';
          return '<tr><td>' + escHtml(name) + '</td><td>' + escHtml(local) + '</td><td>' + badge + '</td></tr>';
        }).join('');
      })
      .catch(function () {
        document.getElementById('history-body').innerHTML =
          '<tr class="empty-row"><td colspan="3">Unable to load history.</td></tr>';
      });
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  /* ---- Auto-refresh every 30s ---- */
  loadSchedules();
  loadHistory();
  setInterval(function () { loadSchedules(); loadHistory(); }, 30000);
}());
</script>
</body>
</html>
