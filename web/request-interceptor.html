<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request Interceptor</title>
  <link rel="stylesheet" href="/web/css/request-interceptor.css">
</head>
<body>
<div class="ric-container">
  <h1 class="ric-title">Request Interceptor</h1>
  <p class="ric-subtitle">Intercept and audit outbound HTTP requests for privacy analysis.</p>

  <div class="ric-stats" id="ric-stats"><p>Loading stats...</p></div>

  <form class="ric-form" id="ric-form">
    <input type="text" id="ric-url" placeholder="Request URL" value="https://api.example.com">
    <input type="text" id="ric-origin" placeholder="Origin" value="https://example.com">
    <select id="ric-method">
      <option value="GET" selected>GET</option>
      <option value="POST">POST</option>
      <option value="PUT">PUT</option>
      <option value="DELETE">DELETE</option>
      <option value="PATCH">PATCH</option>
      <option value="HEAD">HEAD</option>
      <option value="OPTIONS">OPTIONS</option>
    </select>
    <input type="number" id="ric-status" placeholder="Status" min="100" max="599" value="200">
    <input type="number" id="ric-response-ms" placeholder="Response ms" min="0" value="50">
    <input type="number" id="ric-req-size" placeholder="Req bytes" min="0" value="0">
    <input type="number" id="ric-res-size" placeholder="Res bytes" min="0" value="512">
    <button type="submit" class="ric-btn ric-btn-primary">Log Request</button>
  </form>

  <div class="ric-panel" id="ric-panel">Loading logs...</div>
  <div class="ric-msg" id="ric-msg"></div>
</div>
<script src="/web/js/request-interceptor.js"></script>
</body>
</html>
