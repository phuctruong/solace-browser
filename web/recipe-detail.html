<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Detail — Solace Hub</title>
  <link rel="stylesheet" href="/web/css/recipe-detail.css">
</head>
<body>
  <div class="page-header">
    <h1>Recipe Detail</h1>
    <span class="page-subtitle">View and run recipe details</span>
  </div>
  <div id="status-banner" class="status-banner hidden"></div>
  <div class="card" id="recipe-detail-card">
    <div id="recipe-title" class="recipe-title"></div>
    <div id="recipe-description" class="recipe-description"></div>
    <div id="recipe-steps" class="recipe-steps"></div>
    <button id="run-btn" class="btn btn-primary">Run Recipe</button>
  </div>
  <script src="/web/js/recipe-detail.js"></script>
</body>
</html>
