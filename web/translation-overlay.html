<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Translation Overlay — Solace Hub</title>
  <link rel="stylesheet" href="/web/css/translation-overlay.css" />
</head>
<body>
  <div class="to-container">
    <header class="to-header">
      <h1 class="to-title">Translation Overlay</h1>
      <p class="to-subtitle">Record and review page translations with evidence</p>
    </header>

    <section class="to-section">
      <h2 class="to-section-title">Record Translation</h2>
      <div class="to-form">
        <label for="to-source-lang">Source Language</label>
        <select id="to-source-lang" class="to-select">
          <option value="en">English</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="es">Spanish</option>
          <option value="ja">Japanese</option>
          <option value="zh">Chinese</option>
          <option value="ar">Arabic</option>
          <option value="pt">Portuguese</option>
          <option value="ru">Russian</option>
          <option value="ko">Korean</option>
        </select>
        <label for="to-target-lang">Target Language</label>
        <select id="to-target-lang" class="to-select">
          <option value="en">English</option>
          <option value="fr" selected>French</option>
          <option value="de">German</option>
          <option value="es">Spanish</option>
          <option value="ja">Japanese</option>
          <option value="zh">Chinese</option>
          <option value="ar">Arabic</option>
          <option value="pt">Portuguese</option>
          <option value="ru">Russian</option>
          <option value="ko">Korean</option>
        </select>
        <label for="to-char-count">Character Count</label>
        <input type="number" id="to-char-count" class="to-input" min="0" max="5000" value="0" />
        <button id="to-translate-btn" class="to-btn to-btn-primary">Record Translation</button>
        <p id="to-translate-msg" class="to-msg" hidden></p>
      </div>
    </section>

    <section class="to-section">
      <div class="to-section-header">
        <h2 class="to-section-title">Translation History</h2>
        <button id="to-clear-btn" class="to-btn to-btn-danger">Clear History</button>
      </div>
      <div id="to-history" class="to-list" aria-live="polite">
        <p class="to-loading">Loading…</p>
      </div>
    </section>

    <section class="to-section">
      <h2 class="to-section-title">Stats</h2>
      <div id="to-stats" class="to-stats" aria-live="polite">
        <p class="to-loading">Loading…</p>
      </div>
    </section>
  </div>
  <script src="/web/js/translation-overlay.js"></script>
</body>
</html>
