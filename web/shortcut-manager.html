<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shortcut Manager — Solace Hub</title>
<link rel="stylesheet" href="/web/css/shortcut-manager.css">
</head>
<body>
<div class="sc-container">
  <h1 class="sc-title">Shortcut Manager</h1>
  <p class="sc-subtitle">Customize keyboard shortcuts for power users</p>
  <div class="sc-toolbar">
    <button id="btn-sc-list" class="sc-btn sc-btn-primary">All Shortcuts</button>
    <button id="btn-sc-stats" class="sc-btn sc-btn-secondary">Stats</button>
  </div>
  <div id="sc-content" class="sc-content" aria-live="polite"></div>
  <div id="sc-status" class="sc-status" aria-live="polite"></div>
</div>
<script src="/web/js/shortcut-manager.js"></script>
</body>
</html>
