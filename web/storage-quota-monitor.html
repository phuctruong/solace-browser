<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storage Quota Monitor — Solace Hub</title>
<link rel="stylesheet" href="/web/css/storage-quota-monitor.css">
</head>
<body>
<div class="sqm-container">
  <h1 class="sqm-title">Storage Quota Monitor</h1>
  <p class="sqm-subtitle">Track browser storage usage — sites stored as SHA-256 hashes only</p>
  <div class="sqm-toolbar">
    <button id="btn-sqm-list" class="sqm-btn sqm-btn-primary">Measurements</button>
    <button id="btn-sqm-latest" class="sqm-btn sqm-btn-secondary">Latest by Type</button>
    <button id="btn-sqm-types" class="sqm-btn sqm-btn-secondary">Storage Types</button>
    <button id="btn-sqm-add" class="sqm-btn sqm-btn-accent">Record Measurement</button>
  </div>
  <div id="sqm-panel" class="sqm-panel" aria-live="polite"></div>
  <div id="sqm-status" class="sqm-status" aria-live="polite"></div>
</div>
<script src="/web/js/storage-quota-monitor.js"></script>
</body>
</html>
