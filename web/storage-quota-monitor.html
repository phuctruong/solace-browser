<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storage Quota Monitor — Solace Hub</title>
<link rel="stylesheet" href="/web/css/storage-quota-monitor.css">
</head>
<body>
<main class="sqm-shell">
  <header class="sqm-header">
    <h1>Storage Quota Monitor</h1>
    <p>Record storage quota snapshots while storing page locations as SHA-256 only.</p>
  </header>
  <section class="sqm-card">
    <div class="sqm-actions">
      <button id="sqm-load-snapshots" type="button">Snapshots</button>
      <button id="sqm-load-stats" type="button">Stats</button>
      <button id="sqm-load-types" type="button">Storage Types</button>
    </div>
    <form id="sqm-form" class="sqm-form">
      <label>Storage Type
        <select id="sqm-storage-type"></select>
      </label>
      <label>Page URL
        <input id="sqm-url" type="url" placeholder="https://example.com/app">
      </label>
      <label>Used Bytes
        <input id="sqm-used-bytes" type="number" min="0" value="0">
      </label>
      <label>Quota Bytes
        <input id="sqm-quota-bytes" type="number" min="1" value="10485760">
      </label>
      <button type="submit">Record Snapshot</button>
    </form>
  </section>
  <section class="sqm-card">
    <div id="sqm-status" class="sqm-status" aria-live="polite"></div>
    <div id="sqm-results" class="sqm-results" aria-live="polite"></div>
  </section>
</main>
<script src="/web/js/storage-quota-monitor.js"></script>
</body>
</html>
