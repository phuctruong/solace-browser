<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Media Playback Tracker — Solace Hub</title>
  <link rel="stylesheet" href="/web/css/media-playback-tracker.css" />
</head>
<body>
  <div class="mpt-container">
    <header class="mpt-header">
      <h1 class="mpt-title">Media Playback Tracker</h1>
      <p class="mpt-subtitle">Track video and audio playback behavior across sites</p>
    </header>

    <section class="mpt-section">
      <h2 class="mpt-section-title">Stats</h2>
      <div id="mpt-stats" class="mpt-stats-grid"></div>
    </section>

    <section class="mpt-section">
      <h2 class="mpt-section-title">Sessions</h2>
      <div id="mpt-list" class="mpt-list"></div>
    </section>

    <section class="mpt-section">
      <h2 class="mpt-section-title">Media Types</h2>
      <div id="mpt-types" class="mpt-badges"></div>
    </section>
  </div>
  <script src="/web/js/media-playback-tracker.js"></script>
</body>
</html>
