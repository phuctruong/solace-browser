<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notification Filter — Solace Hub</title>
  <link rel="stylesheet" href="/web/css/notification-filter.css" />
</head>
<body>
  <div class="nf-container">
    <header class="nf-header">
      <h1 class="nf-title">Notification Filter</h1>
      <p class="nf-subtitle">Manage notification filter rules and activity log</p>
    </header>

    <section class="nf-section">
      <h2 class="nf-section-title">Filter Rules</h2>
      <div id="nf-rules-list" class="nf-list"></div>
    </section>

    <section class="nf-section">
      <h2 class="nf-section-title">Notification Log</h2>
      <div id="nf-log-list" class="nf-list"></div>
    </section>

    <section class="nf-section">
      <h2 class="nf-section-title">Actions</h2>
      <div id="nf-actions" class="nf-badges"></div>
    </section>
  </div>
  <script src="/web/js/notification-filter.js"></script>
</body>
</html>
