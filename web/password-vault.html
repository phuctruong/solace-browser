<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Vault — Solace Hub</title>
<link rel="stylesheet" href="/web/css/password-vault.css">
</head>
<body>
<div class="pv-container">
  <h1 class="pv-title">Password Vault</h1>
  <p class="pv-subtitle">Secure credential storage with SHA-256 hashing</p>

  <div class="pv-toolbar">
    <select id="pv-filter-category" class="pv-select">
      <option value="">All Categories</option>
      <option value="login">Login</option>
      <option value="api-key">API Key</option>
      <option value="wifi">WiFi</option>
      <option value="bank">Bank</option>
      <option value="note">Note</option>
      <option value="other">Other</option>
    </select>
    <button id="btn-add-entry" class="pv-btn pv-btn-primary">Add Entry</button>
  </div>

  <div id="pv-list" class="pv-list" aria-live="polite"></div>
  <div id="pv-stats" class="pv-stats" aria-live="polite"></div>
  <div id="pv-status" class="pv-status" aria-live="polite"></div>
</div>
<script src="/web/js/password-vault.js"></script>
</body>
</html>
