<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Autofill Tracker</title>
  <link rel="stylesheet" href="/web/css/form-autofill-tracker.css">
</head>
<body>
<div class="aft-container">
  <h1 class="aft-title">Form Autofill Tracker</h1>
  <p class="aft-subtitle">Track autofill usage across form fields. Values are stored as SHA-256 hashes only.</p>

  <div class="aft-stats" id="aft-stats"><p>Loading stats...</p></div>

  <form class="aft-form" id="aft-form">
    <select id="aft-field-type">
      <option value="text">text</option>
      <option value="email">email</option>
      <option value="phone">phone</option>
      <option value="name">name</option>
      <option value="address">address</option>
      <option value="city">city</option>
      <option value="zip">zip</option>
      <option value="country">country</option>
      <option value="credit_card_type">credit_card_type</option>
      <option value="username">username</option>
      <option value="search">search</option>
      <option value="other">other</option>
    </select>
    <input type="text" id="aft-field-name" placeholder="Field name" maxlength="100">
    <input type="url" id="aft-url" placeholder="Page URL">
    <input type="text" id="aft-value" placeholder="Autofilled value">
    <label><input type="checkbox" id="aft-success" checked> Success</label>
    <button type="submit" class="aft-btn aft-btn-primary">Record</button>
  </form>

  <div class="aft-panel" id="aft-panel">Loading entries...</div>
  <div class="aft-status" id="aft-status"></div>
</div>
<script src="/web/js/form-autofill-tracker.js"></script>
</body>
</html>
