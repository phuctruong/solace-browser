<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator — Solace Hub</title>
<link rel="stylesheet" href="/web/css/password-generator.css">
</head>
<body>
<div class="pg-container">
  <h1 class="pg-title">Password Generator</h1>
  <div class="pg-card">
    <label class="pg-label">Length: <span id="pg-len-val">16</span></label>
    <input id="pg-length" type="range" min="8" max="128" value="16" class="pg-slider">
    <div class="pg-checkboxes">
      <label><input type="checkbox" id="pg-upper" checked> Uppercase</label>
      <label><input type="checkbox" id="pg-lower" checked> Lowercase</label>
      <label><input type="checkbox" id="pg-numbers" checked> Numbers</label>
      <label><input type="checkbox" id="pg-symbols"> Symbols</label>
      <label><input type="checkbox" id="pg-exclude-similar"> Exclude Similar</label>
    </div>
    <button id="pg-generate" class="pg-btn">Generate</button>
  </div>
  <div id="pg-result" class="pg-result" style="display:none;">
    <div class="pg-strength-bar-wrap">
      <div id="pg-strength-bar" class="pg-strength-bar"></div>
    </div>
    <div id="pg-strength-label" class="pg-strength-label"></div>
    <div id="pg-hash-display" class="pg-hash"></div>
    <button id="pg-copy" class="pg-btn">Copy Hash</button>
  </div>
  <div class="pg-card">
    <h2 class="pg-subtitle">Audit Password</h2>
    <input id="pg-audit-input" type="password" placeholder="Paste password to check…" class="pg-input">
    <button id="pg-audit-btn" class="pg-btn">Audit</button>
    <div id="pg-audit-result" class="pg-audit-result"></div>
  </div>
  <div class="pg-card">
    <h2 class="pg-subtitle">History (hashes only)</h2>
    <ul id="pg-history" class="pg-history-list"></ul>
  </div>
</div>
<script src="/web/js/password-generator.js"></script>
</body>
</html>
