<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookmarks — Solace Hub</title>
  <link rel="stylesheet" href="/web/css/bookmarks.css">
</head>
<body>
  <div class="page-header">
    <h1>URL Bookmarks</h1>
    <span class="page-subtitle">Remember every important URL</span>
  </div>
  <div id="status-banner" class="status-banner hidden"></div>

  <div class="card">
    <h2>Add Bookmark</h2>
    <form id="bm-form" class="bm-form">
      <label>URL
        <input type="url" id="bm-url" name="url" placeholder="https://example.com" required>
      </label>
      <label>Title
        <input type="text" id="bm-title" name="title" placeholder="Page title">
      </label>
      <label>Tags (comma separated)
        <input type="text" id="bm-tags" name="tags" placeholder="email, work">
      </label>
      <button type="submit" class="btn btn-primary">Add Bookmark</button>
    </form>
  </div>

  <div class="card">
    <h2>Search</h2>
    <input type="text" id="bm-search" placeholder="Search by title or URL..." class="bm-search-input">
  </div>

  <div class="card">
    <h2>Tags</h2>
    <div id="tag-chips" class="tag-chips"></div>
  </div>

  <div class="card">
    <h2>Bookmarks</h2>
    <ul id="bm-list" class="bm-list"></ul>
  </div>
  <script src="/web/js/bookmarks.js"></script>
</body>
</html>
