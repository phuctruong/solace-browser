<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proxy Manager — Solace Hub</title>
<link rel="stylesheet" href="/web/css/proxy-manager.css">
</head>
<body>
<div class="pm-container">
