<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>System Health Dashboard — Solace Hub</title>
  <link rel="stylesheet" href="/web/css/health-dashboard.css" />
</head>
<body>

  <header class="page-header">
    <h1>System Health Dashboard</h1>
    <span class="page-subtitle">Live health checks, metrics, and history</span>
  </header>

  <main class="health-page">

    <!-- Overall status card -->
    <section class="card">
      <div class="card-title">Overall Status</div>
      <div class="status-card">
        <div class="status-badge" id="overall-status">
          <span class="status-dot" id="status-dot"></span>
          <span class="status-text" id="status-text">Loading…</span>
        </div>
        <span class="status-meta" id="status-meta">Checking…</span>
      </div>
    </section>

    <!-- Live metrics -->
    <section class="card">
      <div class="card-title">Live Metrics</div>
      <div class="metrics-grid">
        <div class="metric-tile">
          <div class="metric-label">Uptime</div>
          <div class="metric-value" id="uptime-val">—</div>
        </div>
        <div class="metric-tile">
          <div class="metric-label">CPU %</div>
          <div class="metric-value" id="cpu-val">—</div>
        </div>
        <div class="metric-tile">
          <div class="metric-label">Memory (MB)</div>
          <div class="metric-value" id="mem-val">—</div>
        </div>
        <div class="metric-tile">
          <div class="metric-label">Requests</div>
          <div class="metric-value" id="req-val">—</div>
        </div>
      </div>
    </section>

    <!-- Individual checks -->
    <section class="card">
      <div class="card-title">Health Checks</div>
      <table class="check-table">
        <thead>
          <tr>
            <th>Check</th>
            <th>Description</th>
            <th>Status</th>
            <th>Detail</th>
            <th>Run</th>
          </tr>
        </thead>
        <tbody id="checks-tbody">
          <tr><td colspan="5" class="empty-state">Loading…</td></tr>
        </tbody>
      </table>
    </section>

    <!-- History -->
    <section class="card">
      <div class="card-title">Health History (last 100)</div>
      <table class="check-table">
        <thead>
          <tr>
            <th>Timestamp</th>
            <th>Status</th>
            <th>Uptime (s)</th>
            <th>CPU %</th>
            <th>Requests</th>
          </tr>
        </thead>
        <tbody id="history-tbody">
          <tr><td colspan="5" class="empty-state">Loading…</td></tr>
        </tbody>
      </table>
    </section>

  </main>

  <div class="toast" id="toast"></div>
  <script src="/web/js/health-dashboard.js"></script>
</body>
</html>
