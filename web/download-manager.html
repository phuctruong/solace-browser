<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download Manager — Solace Hub</title>
<link rel="stylesheet" href="/web/css/download-manager.css">
</head>
<body>
<div class="dm-container">
  <h1 class="dm-title">Download Manager</h1>
  <p class="dm-subtitle">Track and manage all browser downloads</p>

  <div class="dm-toolbar">
    <select id="dm-filter" class="dm-select">
      <option value="">All statuses</option>
      <option value="pending">Pending</option>
      <option value="downloading">Downloading</option>
      <option value="completed">Completed</option>
      <option value="failed">Failed</option>
      <option value="cancelled">Cancelled</option>
    </select>
  </div>

  <div class="dm-stats" id="dm-stats"></div>

  <div id="dm-list" class="dm-list" aria-live="polite"></div>
  <div id="dm-status" class="dm-status" aria-live="polite"></div>
</div>
<script src="/web/js/download-manager.js"></script>
</body>
</html>
