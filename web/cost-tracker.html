<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Cost Tracker — Solace Hub</title>
<link rel="stylesheet" href="/web/css/cost-tracker.css">
</head>
<body>
<div class="ct-container">
  <h1 class="ct-title">Session Cost Tracker</h1>
  <p class="ct-subtitle">Zero-surprise billing — see exactly what each session costs</p>

  <section class="ct-section">
    <h2 class="ct-section-title">Daily Budget</h2>
    <div id="ct-gauge" class="ct-gauge" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
      <div id="ct-gauge-bar" class="ct-gauge-bar"></div>
    </div>
    <p id="ct-gauge-label" class="ct-gauge-label">Loading...</p>
  </section>

  <section class="ct-section">
    <h2 class="ct-section-title">Monthly Timeline</h2>
    <svg id="ct-timeline" class="ct-timeline" viewBox="0 0 400 80" aria-label="Monthly cost timeline">
      <text x="0" y="75" class="ct-svg-label">No data</text>
    </svg>
  </section>

  <section class="ct-section">
    <h2 class="ct-section-title">Record Cost Event</h2>
    <form id="ct-record-form" class="ct-form">
      <label class="ct-label" for="ct-session-id">Session ID</label>
      <input type="text" id="ct-session-id" class="ct-input" placeholder="session_abc123" required>
      <label class="ct-label" for="ct-model">Model</label>
      <select id="ct-model" class="ct-input">
        <option value="claude-haiku">claude-haiku</option>
        <option value="claude-sonnet">claude-sonnet</option>
        <option value="gpt-4o-mini">gpt-4o-mini</option>
        <option value="llama-70b">llama-70b</option>
      </select>
      <label class="ct-label" for="ct-tokens-in">Tokens In</label>
      <input type="number" id="ct-tokens-in" class="ct-input" value="1000" min="0">
      <label class="ct-label" for="ct-tokens-out">Tokens Out</label>
      <input type="number" id="ct-tokens-out" class="ct-input" value="500" min="0">
      <button type="submit" class="ct-btn">Record Event</button>
    </form>
    <div id="ct-record-status" class="ct-status" aria-live="polite"></div>
  </section>

  <section class="ct-section">
    <h2 class="ct-section-title">Budget Settings</h2>
    <form id="ct-budget-form" class="ct-form">
      <label class="ct-label" for="ct-daily-limit">Daily Limit (USD)</label>
      <input type="text" id="ct-daily-limit" class="ct-input" placeholder="5.00">
      <label class="ct-label" for="ct-monthly-limit">Monthly Limit (USD)</label>
      <input type="text" id="ct-monthly-limit" class="ct-input" placeholder="50.00">
      <button type="submit" class="ct-btn">Save Budget</button>
    </form>
  </section>

  <div id="ct-alert" class="ct-alert" hidden aria-live="assertive"></div>
</div>
<script src="/web/js/cost-tracker.js"></script>
</body>
</html>
