<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solace Browser</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    :root {
      --sb-bg: #081019;
      --sb-surface: #0f1825;
      --sb-surface-strong: #172335;
      --sb-border: rgba(163, 185, 214, 0.18);
      --sb-text: #f4f7fb;
      --sb-text-muted: #9cb1ca;
      --sb-accent: #ff6b35;
      --sb-signal: #64c4ff;
      --sb-success: #46d9a7;
      --sb-purple: #AE67FA;
      --sb-font-display: "Manrope", "Segoe UI", sans-serif;
      --sb-font-body: "IBM Plex Sans", "Segoe UI", sans-serif;
      --sb-grad-hero-bg: linear-gradient(135deg, #081019 0%, #0f1a2e 50%, #1a1f3a 100%);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: var(--sb-grad-hero-bg);
      color: var(--sb-text);
      font-family: var(--sb-font-body);
      overflow: hidden;
    }

    .start-page {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .start-page::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse at 25% 20%, rgba(100, 196, 255, 0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 75% 80%, rgba(174, 103, 250, 0.03) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ── Login Card ── */
    .login-card {
      position: relative;
      width: 420px;
      max-width: calc(100% - 48px);
      background: var(--sb-surface);
      border: 1px solid var(--sb-border);
      border-radius: 24px;
      padding: 48px 40px 40px;
      text-align: center;
      box-shadow: 0 24px 80px rgba(2, 8, 18, 0.5);
    }

    .splash-img {
      width: 160px;
      height: auto;
      border-radius: 18px;
      margin: 0 auto 24px;
      display: block;
      filter: drop-shadow(0 8px 24px rgba(100, 196, 255, 0.15));
    }

    h1 {
      font-family: var(--sb-font-display);
      font-size: 1.65rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
      background: linear-gradient(135deg, var(--sb-text) 0%, var(--sb-signal) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      color: var(--sb-text-muted);
      font-size: 0.92rem;
      margin-bottom: 32px;
      line-height: 1.4;
    }

    /* ── Auth Buttons ── */
    .auth-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px 20px;
      border-radius: 12px;
      border: 1px solid var(--sb-border);
      background: var(--sb-surface-strong);
      color: var(--sb-text);
      font-family: var(--sb-font-body);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      margin-bottom: 12px;
    }
    .auth-btn:hover {
      border-color: var(--sb-signal);
      background: #1d2d42;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(100, 196, 255, 0.08);
    }
    .auth-btn:active {
      transform: translateY(0);
    }
    .auth-btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--sb-text-muted);
      font-size: 0.78rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--sb-border);
    }

    /* ── Free Notice ── */
    .free-notice {
      background: rgba(70, 217, 167, 0.08);
      border: 1px solid rgba(70, 217, 167, 0.18);
      border-radius: 10px;
      padding: 14px 16px;
      margin-top: 8px;
    }
    .free-notice p {
      font-size: 0.82rem;
      color: var(--sb-text-muted);
      line-height: 1.5;
    }
    .free-notice strong {
      color: var(--sb-success);
    }

    /* ── Footer ── */
    .footer-info {
      position: absolute;
      bottom: 24px;
      display: flex;
      gap: 20px;
      color: var(--sb-text-muted);
      font-size: 0.75rem;
    }
    .footer-info a {
      color: var(--sb-text-muted);
      text-decoration: none;
    }
    .footer-info a:hover { color: var(--sb-signal); }
  </style>
</head>
<body>
  <div class="start-page">

    <div class="login-card">
      <img class="splash-img" src="images/splash/solace-browser-loading-splash-image.png" alt="Solace Browser">
      <h1>Solace Browser</h1>
      <p class="tagline">Sign in to connect your AI worker</p>

      <!-- Google -->
      <button class="auth-btn" id="btn-google">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Sign in with Google
      </button>

      <!-- GitHub -->
      <button class="auth-btn" id="btn-github">
        <svg viewBox="0 0 24 24"><path fill="#f4f7fb" d="M12 1.27a11 11 0 0 0-3.48 21.46c.55.1.75-.24.75-.53v-1.85c-3.07.67-3.72-1.48-3.72-1.48a2.93 2.93 0 0 0-1.23-1.61c-1-.69.08-.67.08-.67a2.32 2.32 0 0 1 1.7 1.14 2.36 2.36 0 0 0 3.22.92 2.36 2.36 0 0 1 .7-1.48c-2.45-.28-5.02-1.23-5.02-5.46a4.27 4.27 0 0 1 1.14-2.97 3.97 3.97 0 0 1 .11-2.93s.93-.3 3.04 1.13a10.48 10.48 0 0 1 5.54 0c2.11-1.43 3.04-1.13 3.04-1.13a3.97 3.97 0 0 1 .11 2.93 4.27 4.27 0 0 1 1.14 2.97c0 4.24-2.58 5.18-5.04 5.45a2.64 2.64 0 0 1 .75 2.05v3.04c0 .29.2.64.76.53A11 11 0 0 0 12 1.27z"/></svg>
        Sign in with GitHub
      </button>

      <div class="divider">or</div>

      <!-- Email -->
      <button class="auth-btn" id="btn-email">
        <svg viewBox="0 0 24 24" fill="none" stroke="#9cb1ca" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="22,6 12,13 2,6"/></svg>
        Sign in with Email
      </button>

      <div class="free-notice">
        <p><strong>Free to start.</strong> No credit card required. Get 2 apps and a managed LLM included. Upgrade anytime for $8/month.</p>
      </div>
    </div>

    <div class="footer-info">
      <span>v1.0.0</span>
      <a href="https://www.solaceagi.com/privacy" target="_blank">Privacy</a>
      <a href="https://www.solaceagi.com/terms" target="_blank">Terms</a>
    </div>

  </div>

  <script>
    var SOLACE_AUTH_URL = 'https://www.solaceagi.com';

    document.getElementById('btn-google').addEventListener('click', function() {
      window.location.href = SOLACE_AUTH_URL + '/auth/login?provider=google&redirect=' + encodeURIComponent(window.location.href);
    });
    document.getElementById('btn-github').addEventListener('click', function() {
      window.location.href = SOLACE_AUTH_URL + '/auth/login?provider=github&redirect=' + encodeURIComponent(window.location.href);
    });
    document.getElementById('btn-email').addEventListener('click', function() {
      window.location.href = SOLACE_AUTH_URL + '/auth/login?provider=email&redirect=' + encodeURIComponent(window.location.href);
    });
  </script>
</body>
</html>
