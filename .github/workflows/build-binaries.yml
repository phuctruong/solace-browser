name: build-binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-and-upload:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_os: linux
            object_name: solace-browser-linux-x86_64
          - os: macos-latest
            target_os: macos
            object_name: solace-browser-macos-universal
          - os: windows-latest
            target_os: windows
            object_name: solace-browser-windows-x86_64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          python -m pip install pyinstaller

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Build + upload via release loop
        shell: bash
        run: |
          chmod +x src/scripts/release_browser_cycle.sh
          TARGET_OS="${{ matrix.target_os }}" \
          OBJECT_NAME="${{ matrix.object_name }}" \
          DOWNLOAD_ENABLED=0 \
          RUN_SMOKE=0 \
          UPLOAD_ENABLED=1 \
          src/scripts/release_browser_cycle.sh

      - name: Upload release-cycle evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-cycle-${{ matrix.target_os }}
          path: scratch/release-cycle/**
