name: build-binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-and-upload:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target_os: linux
            object_name: solace-browser-linux-x86_64
          - os: macos-latest
            target_os: macos
            object_name: solace-browser-macos-universal
          - os: windows-latest
            target_os: windows
            object_name: solace-browser-windows-x86_64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          python -m pip install pyinstaller

      - name: Build native artifact via release loop
        shell: bash
        run: |
          chmod +x src/scripts/release_browser_cycle.sh
          TARGET_OS="${{ matrix.target_os }}" \
          OBJECT_NAME="${{ matrix.object_name }}" \
          DOWNLOAD_ENABLED=0 \
          RUN_SMOKE=0 \
          UPLOAD_ENABLED=0 \
          src/scripts/release_browser_cycle.sh

      - name: Upload native artifact bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target_os }}
          path: |
            dist/${{ matrix.object_name }}
            dist/${{ matrix.object_name }}.sha256
            scratch/release-cycle/**
          if-no-files-found: ignore
