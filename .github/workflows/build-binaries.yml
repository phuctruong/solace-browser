name: build-binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      upload:
        description: 'Upload artifacts to GCS (true/false)'
        required: false
        default: 'false'

permissions:
  contents: read

jobs:
  build:
    name: build-${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            artifact_name: native-linux
            tarball: solace-browser-chromium-linux-x86_64.tar.gz
            artifact_paths: |
              dist/solace-browser-chromium-linux-x86_64.tar.gz
              dist/solace-browser-chromium-linux-x86_64.tar.gz.sha256
              dist/solace-browser_*_amd64.deb
              dist/solace-browser_*_amd64.deb.sha256
          - os: macos-latest
            platform: macos
            artifact_name: native-macos
            tarball: solace-browser-macos-universal.tar.gz
            artifact_paths: |
              dist/solace-browser-macos-universal.tar.gz
              dist/solace-browser-macos-universal.tar.gz.sha256
          - os: windows-latest
            platform: windows
            artifact_name: native-windows
            msi: solace-browser-windows-x86_64.msi
            artifact_paths: |
              dist/solace-browser-windows-x86_64.msi
              dist/solace-browser-windows-x86_64.msi.sha256

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn cryptography websockets httpx pydantic

      - name: Install Linux runtime dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            build-essential \
            curl \
            wget \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            dpkg-dev

      - name: Install WiX toolset
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 4.*
          "$env:USERPROFILE\\.dotnet\\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build native release
        if: matrix.platform != 'windows'
        run: |
          export TARGET_OS=${{ matrix.platform }}
          bash scripts/release_browser_cycle.sh

      - name: Build native Windows release
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $env:TARGET_OS = "${{ matrix.platform }}"
          ./scripts/release_browser_cycle.sh

      - name: Verify binary headers
        shell: python
        run: |
          from pathlib import Path
          import tarfile

          dist = Path("dist")
          platform = "${{ matrix.platform }}"
          version = (Path("VERSION").read_text(encoding="utf-8")).strip()
          if platform == "linux":
              tarball = dist / "${{ matrix.tarball }}"
              deb = dist / f"solace-browser_{version}_amd64.deb"
              assert tarball.is_file(), f"Missing tarball: {tarball}"
              assert deb.is_file(), f"Missing deb: {deb}"
              with tarfile.open(tarball, "r:gz") as archive:
                  names = archive.getnames()
              assert "solace-browser-release/solace" in names
              assert "solace-browser-release/solace-hub" in names
              print(f"OK Linux bundle: {tarball}")
              print(f"OK Debian package: {deb}")
          elif platform == "macos":
              tarball = dist / "${{ matrix.tarball }}"
              assert tarball.is_file(), f"Missing tarball: {tarball}"
              with tarfile.open(tarball, "r:gz") as archive:
                  names = archive.getnames()
              assert "solace-browser-release-macos/solace" in names
              assert "solace-browser-release-macos/solace-hub" in names
              print(f"OK macOS bundle: {tarball}")
          elif platform == "windows":
              msi = dist / "${{ matrix.msi }}"
              assert msi.is_file(), f"Missing MSI: {msi}"
              assert msi.read_bytes().startswith(b"\xd0\xcf\x11\xe0\xa1\xb1\x1a\xe1")
              print(f"OK Windows MSI: {msi}")
          else:
              raise SystemExit(f"Unexpected platform: {platform}")

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error
          retention-days: 30
