name: build-binaries

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            shell: bash
            build_script: scripts/build-linux.sh
          - os: macos-latest
            shell: bash
            build_script: scripts/build-mac.sh
          - os: windows-latest
            shell: bash
            build_script: scripts/build-windows.sh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build dependencies
        shell: ${{ matrix.shell }}
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          python -m pip install pyinstaller

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Build platform binary
        shell: ${{ matrix.shell }}
        run: |
          chmod +x scripts/build-*.sh
          "${{ matrix.build_script }}"

      - name: Upload binaries to GCS
        shell: ${{ matrix.shell }}
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          gsutil -m cp dist/* "gs://solace-downloads/${VERSION}/"

      - name: Publish release metadata
        shell: ${{ matrix.shell }}
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          cat > dist/release-metadata.json <<EOF
          {
            "version": "${VERSION}",
            "bucket": "gs://solace-downloads/${VERSION}/",
            "download_base": "https://storage.googleapis.com/solace-downloads/${VERSION}/"
          }
          EOF
