name: web-architecture

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  verify-web-architecture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Verify shared web architecture contract
        run: ./scripts/check_web_architecture.sh

      - name: Run focused web architecture tests
        run: pytest -q tests/test_web_architecture.py
